<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flutiano — Projects</title>
<link rel="stylesheet" href="shared.css">
<style>
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 30px 36px 46px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .stats-row {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 12px;
  }

  .stat-card {
    background: linear-gradient(180deg, rgba(17,22,29,0.46) 0%, rgba(10,14,20,0.30) 100%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--r);
    backdrop-filter: blur(18px) saturate(145%);
    -webkit-backdrop-filter: blur(18px) saturate(145%);
    padding: 18px 20px;
  }

  .stat-num {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 28px;
    line-height: 1;
    font-weight: 640;
    letter-spacing: -0.05em;
    color: #FFFFFF;
  }

  .stat-num.gold { color: var(--gold); }
  .stat-num.jade { color: var(--jade); }
  .stat-num.sky { color: var(--sky); }
  .stat-num.violet { color: var(--violet); }

  .stat-label {
    margin-top: 6px;
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
  }

  .toolbar-row {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    flex-wrap: wrap;
  }

  .filter-row {
    display: flex;
    gap: 8px;
    align-items: center;
    flex-wrap: wrap;
  }

  .filter-chip {
    padding: 8px 14px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: var(--t3);
    font-size: 12px;
    font-weight: 700;
    letter-spacing: -0.01em;
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s, background 0.15s;
  }

  .filter-chip:hover {
    border-color: rgba(255,255,255,0.14);
    color: #FFFFFF;
  }

  .filter-chip.active {
    background: rgba(212,170,106,0.16);
    border-color: rgba(212,170,106,0.28);
    color: var(--gold-hi);
  }

  .toolbar-note {
    font-size: 12px;
    color: rgba(255,255,255,0.48);
    font-weight: 700;
  }

  .projects-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 16px;
  }

  .project-card,
  .new-tile {
    border-radius: var(--r);
    overflow: hidden;
    position: relative;
    min-height: 320px;
  }

  .project-card {
    background: linear-gradient(180deg, rgba(17,22,29,0.48) 0%, rgba(10,14,20,0.30) 100%);
    border: 1px solid rgba(255,255,255,0.12);
    backdrop-filter: blur(22px) saturate(150%);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
    box-shadow:
      0 20px 44px rgba(4,7,12,0.18),
      inset 0 1px 0 rgba(255,255,255,0.04);
    cursor: pointer;
    transition: transform 0.16s, border-color 0.16s, box-shadow 0.16s;
    display: flex;
    flex-direction: column;
  }

  .project-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.18);
    box-shadow:
      0 24px 58px rgba(4,7,12,0.22),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .project-card:focus-visible {
    outline: 2px solid rgba(212,170,106,0.54);
    outline-offset: 4px;
  }

  .card-media {
    position: relative;
    height: 182px;
    overflow: hidden;
    background: rgba(255,255,255,0.04);
  }

  .card-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .card-media::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(180deg, rgba(5,7,11,0.06) 0%, rgba(5,7,11,0.36) 100%);
    pointer-events: none;
  }

  .card-edit {
    position: absolute;
    top: 14px;
    right: 14px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.14);
    background: rgba(7,9,12,0.56);
    color: #FFFFFF;
    display: flex;
    align-items: center;
    justify-content: center;
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
    z-index: 2;
  }

  .card-edit:hover {
    transform: translateY(-1px);
    border-color: rgba(212,170,106,0.30);
    background: rgba(10,12,16,0.72);
  }

  .card-body {
    padding: 18px 20px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
  }

  .card-top {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 11px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .status-badge::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .tone-gold .status-badge {
    background: rgba(212,170,106,0.16);
    border: 1px solid rgba(212,170,106,0.22);
    color: var(--gold-hi);
  }

  .tone-jade .status-badge {
    background: rgba(94,201,177,0.14);
    border: 1px solid rgba(94,201,177,0.22);
    color: #8DE8D1;
  }

  .tone-sky .status-badge {
    background: rgba(128,191,231,0.14);
    border: 1px solid rgba(128,191,231,0.22);
    color: #A7D9F7;
  }

  .tone-violet .status-badge {
    background: rgba(167,139,250,0.14);
    border: 1px solid rgba(167,139,250,0.22);
    color: #D0C1FF;
  }

  .card-deadline {
    font-size: 11px;
    color: rgba(255,255,255,0.52);
    font-weight: 700;
  }

  .card-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 20px;
    line-height: 1.12;
    letter-spacing: -0.045em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .card-description {
    font-size: 13px;
    line-height: 1.65;
    color: var(--t2);
    display: -webkit-box;
    -webkit-line-clamp: 3;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .card-footer {
    margin-top: auto;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .card-meta {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .card-progress {
    font-size: 28px;
    line-height: 1;
    letter-spacing: -0.05em;
    font-weight: 800;
    color: #FFFFFF;
  }

  .card-progress span {
    font-size: 12px;
    color: rgba(255,255,255,0.48);
    margin-left: 2px;
  }

  .card-meta-label {
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.4);
    font-weight: 800;
    margin-bottom: 6px;
  }

  .card-meta strong {
    display: block;
    font-size: 12px;
    color: #FFFFFF;
    font-weight: 700;
  }

  .progress-track {
    height: 5px;
    border-radius: 999px;
    background: rgba(255,255,255,0.08);
    overflow: hidden;
  }

  .progress-fill {
    height: 100%;
    border-radius: inherit;
    background: linear-gradient(90deg, var(--gold), rgba(255,255,255,0.88));
  }

  .tone-jade .progress-fill {
    background: linear-gradient(90deg, var(--jade), rgba(255,255,255,0.88));
  }

  .tone-sky .progress-fill {
    background: linear-gradient(90deg, var(--sky), rgba(255,255,255,0.88));
  }

  .tone-violet .progress-fill {
    background: linear-gradient(90deg, var(--violet), rgba(255,255,255,0.88));
  }

  .new-tile {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 12px;
    background: rgba(255,255,255,0.03);
    border: 1.5px dashed rgba(255,255,255,0.12);
    color: var(--t3);
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
  }

  .new-tile:hover {
    transform: translateY(-3px);
    border-color: rgba(212,170,106,0.30);
    background: rgba(255,255,255,0.05);
  }

  .new-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    background: rgba(212,170,106,0.14);
    border: 1px solid rgba(212,170,106,0.22);
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-hi);
  }

  .new-label {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 18px;
    line-height: 1.1;
    letter-spacing: -0.04em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .new-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.46);
    font-weight: 700;
  }

  @media (max-width: 1180px) {
    .projects-grid,
    .stats-row {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }

  @media (max-width: 760px) {
    .content {
      padding: 24px 20px 36px;
    }

    .projects-grid,
    .stats-row {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<script src="project-store.js"></script>
<script>
  const store = window.FlutianoProjectStore;
  let activeFilter = "all";

  function renderStats(projects) {
    const active = projects.filter((project) => project.status === "Active").length;
    const progress = projects.filter((project) => project.status === "In Progress").length;
    const draft = projects.filter((project) => project.status === "Draft").length;
    const released = projects.filter((project) => project.status === "Released").length;

    document.getElementById("stats-row").innerHTML = `
      <div class="stat-card">
        <div class="stat-num">${projects.length}</div>
        <div class="stat-label">Total Projects</div>
      </div>
      <div class="stat-card">
        <div class="stat-num gold">${active}</div>
        <div class="stat-label">Active</div>
      </div>
      <div class="stat-card">
        <div class="stat-num jade">${progress}</div>
        <div class="stat-label">In Progress</div>
      </div>
      <div class="stat-card">
        <div class="stat-num sky">${draft}</div>
        <div class="stat-label">Draft</div>
      </div>
    `;
  }

  function renderFilters() {
    const filters = [
      { key: "all", label: "All" },
      { key: "Active", label: "Active" },
      { key: "In Progress", label: "In Progress" },
      { key: "Draft", label: "Draft" },
      { key: "Released", label: "Released" }
    ];

    document.getElementById("filter-row").innerHTML = filters.map((filter) => `
      <button
        class="filter-chip ${filter.key === activeFilter ? "active" : ""}"
        type="button"
        onclick="setFilter('${filter.key.replace(/'/g, "\\'")}')"
      >
        ${filter.label}
      </button>
    `).join("");
  }

  function setFilter(filter) {
    activeFilter = filter;
    renderFilters();
    renderProjects();
  }

  function openDetail(id) {
    window.location.href = store.getDetailUrl(id);
  }

  function openEdit(id, event) {
    if (event) {
      event.stopPropagation();
      event.preventDefault();
    }
    window.location.href = store.getEditUrl(id);
  }

  function renderProjectCard(project) {
    const tone = store.getTone(project);
    const thumbnail = store.getThumbnail(project);
    const instruments = project.music.selectedInstruments || [];
    const linkedSources = store.getSourceLibraryEntries(project);
    const sourceCount = linkedSources.sheet.length + linkedSources.harmony.length + linkedSources.audio.length + linkedSources.additional.length;
    const openTasks = project.todos.filter((todo) => !todo.completed).length;
    
    return `
      <article class="project-card tone-${tone}" tabindex="0" role="link" aria-label="Open ${project.title}" onclick="openDetail('${project.id}')" onkeydown="handleProjectKey(event, '${project.id}')">
        <div class="card-media">
          <img src="${thumbnail}" alt="${project.title}">
          <div class="card-edit" title="Edit project" onclick="openEdit('${project.id}', event)">
            <svg width="14" height="14" viewBox="0 0 15 15" fill="none">
              <path d="M3 10.8V12h1.2l6.6-6.6-1.2-1.2L3 10.8Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
              <path d="M8.9 3.6l1.2-1.2a1 1 0 011.4 0l1 1a1 1 0 010 1.4l-1.2 1.2" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
            </svg>
          </div>
          <div class="status-badge" style="position:absolute; left:14px; bottom:14px; z-index:2; backdrop-filter:blur(10px); background:rgba(0,0,0,0.4); border-color:rgba(255,255,255,0.2);">${project.status}</div>
        </div>
        <div class="card-body">
          <div class="card-top" style="margin-bottom:4px;">
            <span class="card-author" style="font-size:9px; letter-spacing:0.12em; text-transform:uppercase; color:rgba(255,255,255,0.36); font-weight:800;">${project.category || 'PROJECT'}</span>
            <span class="card-deadline" style="color:rgba(255,255,255,0.4);">${store.formatDate(project.deadline, true)}</span>
          </div>
          <h2 class="card-title">${project.title}</h2>
          
          <div class="card-instr-chips" style="display:flex; flex-wrap:wrap; gap:4px; margin:8px 0 12px;">
            ${instruments.length > 0 
              ? instruments.slice(0, 3).map(id => {
                  const item = store.INSTRUMENT_LIBRARY.find(i => i.id === id);
                  return `<span class="instr-tag" style="display:inline-flex; align-items:center; gap:4px; padding:3px 8px; border-radius:6px; background:rgba(255,255,255,0.06); font-size:9px; font-weight:700; color:rgba(255,255,255,0.6); border:1px solid rgba(255,255,255,0.04);">
                    ${item ? `<img src="${item.img}" style="width:12px; height:12px; filter:brightness(0) invert(1); opacity:0.6;">` : ''}
                    ${item ? item.label : id}
                  </span>`;
                }).join('') + (instruments.length > 3 ? `<span style="font-size:9px; color:rgba(255,255,255,0.3); align-self:center;">+${instruments.length - 3}</span>` : '')
              : `<span style="font-size:9px; color:rgba(255,255,255,0.2); font-style:italic;">No instruments set</span>`
            }
          </div>

          <div class="card-footer" style="margin-top:auto; padding-top:12px; border-top:1px solid rgba(255,255,255,0.05);">
            <div class="card-meta">
              <div>
                <div class="card-meta-label">Progress</div>
                <div class="card-progress">${project.progress}<span>%</span></div>
              </div>
              <div class="progress-track" style="flex:1; margin-left:16px;">
                <div class="progress-fill" style="width:${project.progress}%"></div>
              </div>
            </div>
            <div style="display:flex; gap:12px; flex-wrap:wrap;">
              <span style="font-size:10px; color:rgba(255,255,255,0.52); font-weight:800; letter-spacing:0.12em; text-transform:uppercase;">${openTasks} open tasks</span>
              <span style="font-size:10px; color:rgba(255,255,255,0.52); font-weight:800; letter-spacing:0.12em; text-transform:uppercase;">${sourceCount} linked sources</span>
            </div>
          </div>
        </div>
      </article>
    `;
  }

  function handleProjectKey(event, id) {
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      openDetail(id);
    }
  }

  function renderProjects() {
    const projects = store.getProjects();
    const filtered = activeFilter === "all"
      ? projects
      : projects.filter((project) => project.status === activeFilter);

    document.getElementById("toolbar-note").textContent = `${filtered.length} project${filtered.length === 1 ? "" : "s"} visible`;

    document.getElementById("projects-grid").innerHTML = `
      ${filtered.map(renderProjectCard).join("")}
      <a class="new-tile" href="new-project.html">
        <div class="new-icon">
          <svg width="18" height="18" viewBox="0 0 18 18" fill="none">
            <path d="M9 3v12M3 9h12" stroke="currentColor" stroke-width="2" stroke-linecap="round"/>
          </svg>
        </div>
        <div class="new-label">Start a new project</div>
        <div class="new-sub">Add a new song or music-video workflow</div>
      </a>
    `;
  }

  function initProjectsPage() {
    const projects = store.getProjects();
    renderStats(projects);
    renderFilters();
    renderProjects();
  }

  window.addEventListener(store.TODO_UPDATE_EVENT, initProjectsPage);
  window.addEventListener("storage", (event) => {
    if (!event.key || event.key === store.STORAGE_KEY) {
      initProjectsPage();
    }
  });

  initProjectsPage();
</script>
</body>
</html>
