<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flutiano — New Project</title>
<link rel="stylesheet" href="shared.css">
<style>
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 34px 38px 110px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .hero-card,
  .section-card {
    background: linear-gradient(180deg, rgba(17,22,29,0.48) 0%, rgba(10,14,20,0.30) 100%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--r);
    backdrop-filter: blur(22px) saturate(150%);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
    box-shadow:
      0 18px 52px rgba(4,7,12,0.18),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .hero-card {
    padding: 24px 30px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
  }

  .hero-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 28px;
    line-height: 1.04;
    letter-spacing: -0.05em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .back-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 15px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.72);
    font-size: 12px;
    font-weight: 800;
    transition: transform 0.15s, border-color 0.15s, color 0.15s;
  }

  .back-btn:hover {
    transform: translateY(-1px);
    color: #FFFFFF;
    border-color: rgba(255,255,255,0.18);
  }

  .section-card {
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 20px;
    line-height: 1.1;
    letter-spacing: -0.04em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .form-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  .field label {
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    font-weight: 800;
  }

  .input,
  .select,
  .textarea {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: #FFFFFF;
    font: inherit;
    transition: border-color 0.15s, background 0.15s;
  }

  .input,
  .select {
    min-height: 46px;
    padding: 0 14px;
  }

  .select {
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }

  .select option {
    background: #14181f;
    color: #FFFFFF;
  }

  .input:focus,
  .select:focus,
  .textarea:focus {
    outline: none;
    border-color: rgba(212,170,106,0.30);
    background: rgba(255,255,255,0.05);
  }

  .info-grid {
    display: grid;
    grid-template-columns: 240px minmax(0, 1fr);
    gap: 24px;
    align-items: start;
  }

  .thumb-frame {
    position: relative;
    border-radius: 20px;
    overflow: hidden;
    background: rgba(255,255,255,0.03);
    border: 1px solid rgba(255,255,255,0.1);
  }

  .thumb-frame img {
    width: 100%;
    aspect-ratio: 1;
    object-fit: cover;
    display: block;
  }

  .thumb-btn {
    position: absolute;
    bottom: 12px;
    right: 12px;
    width: 38px;
    height: 38px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.2);
    background: rgba(0,0,0,0.6);
    backdrop-filter: blur(10px);
    color: #fff;
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .instr-library {
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .instr-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(90px, 1fr));
    gap: 10px;
  }

  .instr-card {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px 8px 10px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    transition: all 0.2s ease;
  }

  .instr-card .instr-icon-wrap {
    width: 50px;
    height: 50px;
    display: flex;
    align-items: center;
    justify-content: center;
    border-radius: 12px;
    background: rgba(255,255,255,0.02);
  }

  .instr-card img {
    width: 80%;
    height: 80%;
    object-fit: contain;
    filter: brightness(0) invert(1);
    opacity: 0.5;
  }

  .instr-card.selected {
    background: rgba(212,170,106,0.15);
    border-color: rgba(212,170,106,0.3);
  }

  .instr-card.selected img {
    opacity: 1;
  }

  .instr-name { font-size: 10px; font-weight: 700; color: rgba(255,255,255,0.5); }
  .instr-card.selected .instr-name { color: var(--gold-hi); }

  .instr-selected-zone {
    min-height: 48px;
    padding: 10px;
    border-radius: 16px;
    border: 1px dashed rgba(255,255,255,0.1);
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .instr-selected-chip {
    padding: 5px 12px;
    border-radius: 999px;
    background: rgba(212,170,106,0.1);
    color: var(--gold-hi);
    font-size: 11px;
    font-weight: 700;
    border: 1px solid rgba(212,170,106,0.2);
  }

  .sticky-submit {
    position: fixed;
    left: calc(var(--sw) + 32px);
    right: 32px;
    bottom: 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
    padding: 14px 16px;
    border-radius: 20px;
    background: rgba(8,11,16,0.74);
    border: 1px solid rgba(255,255,255,0.10);
    backdrop-filter: blur(22px) saturate(140%);
    box-shadow: 0 16px 42px rgba(0,0,0,0.24);
    z-index: 80;
  }

  .primary-btn {
    padding: 11px 20px;
    border-radius: 999px;
    background: rgba(212,170,106,0.2);
    border: 1px solid rgba(212,170,106,0.3);
    color: var(--gold-hi);
    font-weight: 800;
    cursor: pointer;
  }

  .secondary-btn {
    padding: 11px 20px;
    border-radius: 999px;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.1);
    color: #fff;
    font-weight: 800;
    cursor: pointer;
  }
</style>
</head>
<body>

<div class="bg-art" aria-hidden="true"></div>

<aside class="sidebar">
  <a class="brand-block" href="dashboard.html">
    <div class="brand-mark"><div class="brand-name">The Flutiano</div></div>
  </a>

  <div class="nav-scroll">
    <a class="nav-item" href="dashboard.html">Dashboard</a>
    <a class="nav-item active" href="projects.html">Projects</a>
    <a class="nav-item" href="weekly-progress.html">Weekly Progress</a>
    <a class="nav-item" href="library.html">Library</a>
  </div>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <span class="page-title">Start New Project</span>
  </div>

  <div class="content">
    <section class="hero-card">
      <h1 class="hero-title">New Song Project</h1>
      <a class="back-btn" href="projects.html">Cancel</a>
    </section>

    <section class="section-card">
      <div class="section-title">Core Info</div>
      <div class="info-grid">
        <div class="thumb-frame">
          <img id="thumbnail-preview" src="">
          <label class="thumb-btn" for="thumbnail-input">📷</label>
          <input type="file" id="thumbnail-input" style="display:none;" accept="image/*">
        </div>

        <div class="form-grid">
          <div class="field full">
            <label for="title">Song Title</label>
            <input class="input" id="title" type="text" placeholder="Title of your masterpiece...">
          </div>
          <div class="field">
            <label for="status">Initial Status</label>
            <select class="select" id="status">
              <option>Draft</option>
              <option selected>Active</option>
            </select>
          </div>
          <div class="field">
            <label for="deadline">Target Deadline</label>
            <input class="input" id="deadline" type="date">
          </div>
          <div class="field full">
            <label for="shortDescription">Short Note / Hook</label>
            <input class="input" id="shortDescription" type="text" placeholder="Something to keep the vibe in check...">
          </div>
        </div>
      </div>
    </section>

    <section class="section-card">
      <div class="section-title">Instrumentation Plan</div>
      <div class="instr-library">
        <div class="instr-selected-zone" id="instr-selected-zone"></div>
        <div class="instr-grid" id="instrument-picker"></div>
      </div>
    </section>

    <section class="section-card">
      <div class="section-title">Song Master Key</div>
      <div class="form-grid" style="grid-template-columns: 1fr 1fr;">
        <div class="field">
          <label for="originalKey">Original Key (if cover)</label>
          <select class="select" id="originalKey"></select>
        </div>
        <div class="field">
          <label for="finalKey">Final Project Key</label>
          <select class="select" id="finalKey"></select>
        </div>
      </div>
    </section>
  </div>
</div>

<div class="sticky-submit">
  <div style="font-size:12px; color:rgba(255,255,255,0.4); font-weight:700;">Essentials locked. Other workflows unlock in the Project Hub.</div>
  <div class="submit-actions">
    <button class="primary-btn" type="button" id="create-project">Create Project &rarr;</button>
  </div>
</div>

<script src="project-store.js"></script>
<script>
  const store = window.FlutianoProjectStore;
  const state = {
    thumbnail: "",
    selectedInstruments: []
  };

  function renderThumbnail() {
    const img = document.getElementById("thumbnail-preview");
    img.src = state.thumbnail || store.createPlaceholderImage(document.getElementById("title").value || "New", "gold", "THUMB");
  }

  function renderInstrumentPicker() {
    const picker = document.getElementById("instrument-picker");
    const zone   = document.getElementById("instr-selected-zone");
    
    picker.innerHTML = store.INSTRUMENT_LIBRARY.map(item => {
      const sel = state.selectedInstruments.includes(item.id);
      return `<div class="instr-card ${sel?'selected':''}" data-id="${item.id}">
        <div class="instr-icon-wrap"><img src="${item.img}"></div>
        <div class="instr-name">${item.label}</div>
      </div>`;
    }).join('');

    zone.innerHTML = state.selectedInstruments.length 
      ? state.selectedInstruments.map(id => `<span class="instr-selected-chip">${id}</span>`).join('')
      : '<span style="color:rgba(255,255,255,0.2); font-style:italic; font-size:11px;">No instruments chosen</span>';
  }

  function populateKeys() {
    const options = store.KEY_OPTIONS.map(k => `<option value="${k}">${k}</option>`).join('');
    document.getElementById("originalKey").innerHTML = '<option value="">None</option>' + options;
    document.getElementById("finalKey").innerHTML = '<option value="">Not decided</option>' + options;
  }

  document.getElementById("thumbnail-input").onchange = async (e) => {
    const file = e.target.files[0];
    if (file) { state.thumbnail = await store.readFileAsDataUrl(file); renderThumbnail(); }
  };

  document.getElementById("instrument-picker").onclick = (e) => {
    const card = e.target.closest(".instr-card");
    if (!card) return;
    const id = card.dataset.id;
    if (state.selectedInstruments.includes(id)) {
      state.selectedInstruments = state.selectedInstruments.filter(x => x !== id);
    } else {
      state.selectedInstruments.push(id);
    }
    renderInstrumentPicker();
  };

  document.getElementById("create-project").onclick = () => {
    const title = document.getElementById("title").value.trim();
    if (!title) { alert("Title is required"); return; }
    
    const project = store.createEmptyProject(null, title);
    project.status = document.getElementById("status").value;
    project.deadline = document.getElementById("deadline").value;
    project.thumbnail = state.thumbnail;
    project.shortDescription = document.getElementById("shortDescription").value;
    project.music.selectedInstruments = state.selectedInstruments;
    project.songWorkflow.masterKey.originalKey = document.getElementById("originalKey").value;
    project.songWorkflow.masterKey.finalKey = document.getElementById("finalKey").value;

    const saved = store.upsertProject(project);
    window.location.href = `project-detail.html?project=${saved.id}`;
  };

  populateKeys();
  renderThumbnail();
  renderInstrumentPicker();
</script>
</body>
</html>
