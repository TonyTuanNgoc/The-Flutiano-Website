<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flutiano — Edit Project</title>
<link rel="stylesheet" href="shared.css">
<style>
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px 132px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .panel,
  .hero-panel,
  .tab-panel,
  .sheet-entry-card,
  .sheet-thumb,
  .modal-shell {
    background: linear-gradient(180deg, rgba(17,22,29,0.48) 0%, rgba(10,14,20,0.30) 100%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: var(--r);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow:
      0 18px 44px rgba(4,7,12,0.18),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .hero-panel {
    padding: 20px 22px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 18px;
  }

  .hero-main {
    min-width: 0;
    display: flex;
    align-items: center;
    gap: 16px;
  }

  .back-btn,
  .ghost-btn,
  .primary-btn,
  .mini-icon-btn,
  .tab-chip {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 999px;
    font-weight: 800;
    transition: transform 0.15s, border-color 0.15s, background 0.15s, color 0.15s, opacity 0.15s;
    cursor: pointer;
  }

  .back-btn,
  .ghost-btn {
    padding: 10px 15px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--t2);
    font-size: 12px;
  }

  .back-btn:hover,
  .ghost-btn:hover,
  .primary-btn:hover,
  .mini-icon-btn:hover,
  .tab-chip:hover {
    transform: translateY(-1px);
  }

  .primary-btn {
    padding: 10px 16px;
    border: 1px solid rgba(212,170,106,0.26);
    background: rgba(212,170,106,0.16);
    color: var(--gold-hi);
    font-size: 12px;
  }

  .ghost-btn {
    color: var(--t1);
  }

  .mini-icon-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--t2);
  }

  .mini-icon-btn.is-accent {
    border-color: rgba(212,170,106,0.26);
    color: var(--gold-hi);
    background: rgba(212,170,106,0.12);
  }

  .mini-icon-btn[aria-disabled="true"] {
    opacity: 0.4;
    pointer-events: none;
  }

  .hero-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 24px;
    line-height: 1.06;
    letter-spacing: -0.045em;
    color: #FFFFFF;
    font-weight: 600;
  }

  .hero-meta {
    font-size: 10px;
    line-height: 1;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
    margin-bottom: 6px;
  }

  .hero-sub {
    font-size: 13px;
    line-height: 1.6;
    color: var(--t2);
    max-width: 760px;
  }

  .tab-bar {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .tab-chip {
    padding: 10px 16px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: var(--t2);
    font-size: 12px;
  }

  .tab-chip.is-active {
    background: var(--gold-lo);
    color: var(--gold);
    border-color: rgba(212,170,106,0.28);
  }

  .tab-panel {
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .tab-panel[hidden] {
    display: none;
  }

  .panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .section-label {
    font-size: 10px;
    line-height: 1;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.62);
    font-weight: 800;
  }

  .section-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 24px;
    line-height: 1.06;
    letter-spacing: -0.04em;
    color: #FFFFFF;
    font-weight: 600;
  }

  .section-copy {
    font-size: 13px;
    line-height: 1.68;
    color: var(--t2);
    max-width: 820px;
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .field {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .field.full {
    grid-column: 1 / -1;
  }

  .field label {
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
  }

  .input,
  .textarea,
  .select {
    width: 100%;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: #FFFFFF;
    font: inherit;
    transition: border-color 0.15s, background 0.15s, box-shadow 0.15s;
  }

  .input,
  .select {
    min-height: 48px;
    padding: 0 14px;
  }

  .textarea {
    min-height: 120px;
    padding: 14px;
    resize: vertical;
  }

  .textarea.small {
    min-height: 90px;
  }

  .input:focus,
  .textarea:focus,
  .select:focus {
    outline: none;
    border-color: rgba(212,170,106,0.30);
    box-shadow: 0 0 0 4px rgba(212,170,106,0.08);
  }

  .select {
    appearance: none;
    -webkit-appearance: none;
    cursor: pointer;
  }

  .select-wrap {
    position: relative;
  }

  .select-wrap::after {
    content: "";
    position: absolute;
    top: 50%;
    right: 18px;
    width: 8px;
    height: 8px;
    border-right: 1.5px solid rgba(255,255,255,0.58);
    border-bottom: 1.5px solid rgba(255,255,255,0.58);
    transform: translateY(-60%) rotate(45deg);
    pointer-events: none;
  }

  .core-grid {
    display: grid;
    grid-template-columns: 260px minmax(0, 1fr);
    gap: 18px;
    align-items: start;
  }

  .thumbnail-stack {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .thumbnail-frame {
    position: relative;
    aspect-ratio: 3 / 4;
    overflow: hidden;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
  }

  .thumbnail-frame img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .thumbnail-overlay {
    position: absolute;
    inset: auto 12px 12px 12px;
    display: flex;
    gap: 8px;
  }

  .thumbnail-note {
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    font-size: 12px;
    line-height: 1.65;
    color: var(--t2);
  }

  .instrument-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(280px, 320px);
    gap: 16px;
  }

  .instrument-picker,
  .selected-panel,
  .key-library,
  .step-card,
  .workflow-focus-card,
  .support-panel,
  .sheet-group {
    padding: 18px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
  }

  .instrument-picker-grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(110px, 1fr));
    gap: 10px;
  }

  .instrument-option {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 8px;
    padding: 12px 10px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.03);
    cursor: pointer;
    transition: transform 0.15s, border-color 0.15s, background 0.15s;
  }

  .instrument-option:hover {
    transform: translateY(-1px);
    border-color: rgba(255,255,255,0.14);
    background: rgba(255,255,255,0.05);
  }

  .instrument-option.is-selected {
    border-color: rgba(212,170,106,0.28);
    background: rgba(212,170,106,0.10);
  }

  .instrument-icon {
    width: 56px;
    height: 56px;
    border-radius: 16px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .instrument-icon img {
    width: 40px;
    height: 40px;
    object-fit: contain;
    filter: brightness(0) saturate(100%) invert(81%) sepia(20%) saturate(741%) hue-rotate(351deg) brightness(95%) contrast(87%);
  }

  .instrument-name {
    font-size: 11px;
    line-height: 1.35;
    font-weight: 800;
    color: #FFFFFF;
    text-align: center;
  }

  .selected-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .selected-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(212,170,106,0.22);
    background: rgba(212,170,106,0.12);
    color: var(--gold-hi);
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
  }

  .selected-empty {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 18px;
    border-radius: 18px;
    border: 1px dashed rgba(255,255,255,0.10);
    color: var(--t3);
    font-size: 13px;
    line-height: 1.6;
  }

  .workflow-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .step-card {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .step-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .step-meta {
    display: flex;
    flex-direction: column;
    gap: 6px;
  }

  .step-label {
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
  }

  .step-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 22px;
    line-height: 1.08;
    color: #FFFFFF;
    font-weight: 600;
    letter-spacing: -0.04em;
  }

  .key-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) 140px minmax(0, 1fr);
    gap: 14px;
    align-items: end;
  }

  .locked-key-card {
    padding: 18px;
    border-radius: 20px;
    border: 1px solid rgba(212,170,106,0.22);
    background:
      radial-gradient(circle at top right, rgba(212,170,106,0.16), transparent 38%),
      rgba(255,255,255,0.04);
  }

  .locked-key-card span,
  .key-secondary span,
  .info-stat span,
  .sheet-count span,
  .workflow-focus-card span,
  .sheet-entry-label {
    display: block;
    margin-bottom: 6px;
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.40);
    font-weight: 800;
  }

  .locked-key-card strong {
    display: block;
    font-size: 30px;
    line-height: 1;
    font-weight: 800;
    color: var(--gold-hi);
    letter-spacing: -0.05em;
    margin-bottom: 10px;
  }

  .locked-key-card small {
    display: block;
    font-size: 13px;
    line-height: 1.6;
    color: var(--t2);
    font-weight: 700;
  }

  .key-secondary,
  .key-shift-card,
  .info-stat,
  .sheet-count {
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
  }

  .key-secondary strong,
  .info-stat strong,
  .sheet-count strong {
    display: block;
    font-size: 14px;
    line-height: 1.5;
    color: #FFFFFF;
    font-weight: 700;
  }

  .key-shift-card {
    text-align: center;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 8px;
  }

  .key-shift-value {
    font-size: 34px;
    line-height: 1;
    color: var(--sky);
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .key-shift-copy {
    font-size: 12px;
    line-height: 1.55;
    color: var(--t2);
    font-weight: 700;
  }

  .key-library {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .key-library .library-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .theory-chip {
    display: inline-flex;
    align-items: center;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 800;
  }

  .five-step-strip {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }

  .step-icon-block {
    min-height: 78px;
    padding: 14px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-icon-block.is-active {
    border-color: rgba(212,170,106,0.24);
    background: rgba(212,170,106,0.10);
  }

  .step-icon-block .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .step-icon-block img {
    width: 22px;
    height: 22px;
    object-fit: contain;
    display: block;
  }

  .step-icon-block svg {
    width: 22px;
    height: 22px;
    color: rgba(255,255,255,0.9);
  }

  .sheet-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 14px;
  }

  .sheet-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .sheet-group-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
  }

  .sheet-group-title {
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    font-weight: 800;
    color: #FFFFFF;
  }

  .sheet-group-title img {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }

  .sheet-group-actions {
    display: flex;
    gap: 8px;
  }

  .sheet-entry-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sheet-entry-card {
    padding: 14px;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .sheet-entry-row {
    display: grid;
    grid-template-columns: minmax(0, 1fr) minmax(0, 1fr) 34px;
    gap: 10px;
    align-items: start;
  }

  .sheet-thumb-area {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .sheet-thumb {
    position: relative;
    width: 84px;
    height: 84px;
    overflow: hidden;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.10);
  }

  .sheet-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
    cursor: pointer;
  }

  .sheet-thumb-del {
    position: absolute;
    top: 6px;
    right: 6px;
    width: 22px;
    height: 22px;
    border: 0;
    border-radius: 50%;
    background: rgba(7,9,12,0.78);
    color: #FFFFFF;
    cursor: pointer;
  }

  .sheet-upload {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    width: fit-content;
    padding: 8px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: var(--t2);
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
  }

  .sheet-upload input {
    display: none;
  }

  .sheet-empty {
    min-height: 120px;
    display: flex;
    align-items: center;
    justify-content: center;
    text-align: center;
    padding: 18px;
    border-radius: 18px;
    border: 1px dashed rgba(255,255,255,0.10);
    color: var(--t3);
    font-size: 13px;
    line-height: 1.6;
  }

  .support-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .toggle-row {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }

  .toggle-chip {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    color: var(--t2);
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
  }

  .toggle-chip.is-selected {
    border-color: rgba(212,170,106,0.26);
    background: rgba(212,170,106,0.12);
    color: var(--gold-hi);
  }

  .workflow-focus-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .workflow-focus-card {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .workflow-focus-card strong {
    font-size: 16px;
    line-height: 1.35;
    color: #FFFFFF;
    font-weight: 700;
  }

  .workflow-focus-card p {
    font-size: 13px;
    line-height: 1.65;
    color: var(--t2);
  }

  .link-chip-list {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .link-chip {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 800;
  }

  .sticky-submit {
    position: fixed;
    right: 24px;
    bottom: 24px;
    z-index: 80;
    display: none;
    align-items: center;
    gap: 10px;
    padding: 12px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(8,11,16,0.84);
    backdrop-filter: blur(24px) saturate(140%);
    -webkit-backdrop-filter: blur(24px) saturate(140%);
    box-shadow: 0 18px 40px rgba(0,0,0,0.28);
  }

  .modal-backdrop {
    position: fixed;
    inset: 0;
    z-index: 120;
    padding: 28px;
    background: rgba(4,7,11,0.76);
    backdrop-filter: blur(10px);
    -webkit-backdrop-filter: blur(10px);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .modal-backdrop[hidden] {
    display: none;
  }

  .modal-shell {
    width: min(1120px, 100%);
    max-height: min(88vh, 920px);
    overflow: hidden;
    display: flex;
    flex-direction: column;
  }

  .modal-topbar {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
    padding: 14px 18px;
    border-bottom: 1px solid rgba(255,255,255,0.08);
  }

  .modal-title {
    font-size: 14px;
    font-weight: 800;
    color: #FFFFFF;
  }

  .modal-body {
    padding: 20px;
    overflow: auto;
    display: flex;
    justify-content: center;
    align-items: center;
    background: rgba(0,0,0,0.18);
  }

  .modal-body img {
    max-width: 100%;
    max-height: 100%;
    border-radius: 18px;
    display: block;
  }

  .hidden-input {
    display: none;
  }

  @media (max-width: 1280px) {
    .sheet-grid,
    .workflow-grid,
    .workflow-focus-grid,
    .key-library {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 980px) {
    .core-grid,
    .instrument-shell,
    .support-grid {
      grid-template-columns: 1fr;
    }

    .key-grid,
    .sheet-entry-row,
    .field-grid,
    .five-step-strip {
      grid-template-columns: 1fr;
    }

    .sticky-submit {
      left: 20px;
      right: 20px;
      justify-content: space-between;
    }
  }

  @media (max-width: 760px) {
    .content {
      padding: 24px 18px 140px;
    }

    .hero-panel {
      flex-direction: column;
      align-items: flex-start;
    }

    .tab-bar {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }
  }
</style>
</head>
<body>

<div class="bg-art" aria-hidden="true"></div>

    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

    const params = new URLSearchParams(window.location.search);

            <label for="imageWorkflowNotes">Image Workflow Notes</label>
            <textarea class="textarea small" id="imageWorkflowNotes" placeholder="How the image production should run..."></textarea>
          </div>
          <div class="field full">
            <label for="imageReferenceFrames">Reference Frames</label>
            <textarea class="textarea small" id="imageReferenceFrames" placeholder="Label | https://..."></textarea>
          </div>
          <div class="field full">
            <label for="imageDeliveryNotes">Delivery Notes</label>
            <textarea class="textarea small" id="imageDeliveryNotes" placeholder="Thumbnail, frame exports, Milanote usage notes..."></textarea>
          </div>
          <div class="field full">
            <label for="visualTasks">Image Tasks</label>
            <textarea class="textarea small" id="visualTasks" placeholder="One task per line"></textarea>
          </div>
          <div class="field full">
            <label for="youtubeReferences">YouTube References</label>
            <textarea class="textarea small" id="youtubeReferences" placeholder="One YouTube URL per line"></textarea>
          </div>
        </div>
      </section>
    `;
  }

  function populateKeySelect(selectId) {
    const select = document.getElementById(selectId);
    select.innerHTML = [`<option value="">Select a key</option>`]
      .concat(store.KEY_OPTIONS.map((key) => `<option value="${escapeHtml(key)}">${escapeHtml(key)}</option>`))
      .join("");
  }

  function renderThumbnail() {
    const preview = document.getElementById("thumbnail-preview");
    if (!preview) return;
    preview.src = state.thumbnail || store.getThumbnail(state.project);
  }

  function renderInstrumentPicker() {
    const picker = document.getElementById("instrument-picker");
    const selected = document.getElementById("selected-instruments");
    if (!picker || !selected) return;

    picker.innerHTML = store.INSTRUMENT_LIBRARY.map((item) => `
      <button class="instrument-option ${state.selectedInstruments.includes(item.id) ? "is-selected" : ""}" type="button" data-instrument="${escapeHtml(item.id)}">
        <div class="instrument-icon">
          <img src="${escapeHtml(item.img)}" alt="${escapeHtml(item.label)}">
        </div>
        <div class="instrument-name">${escapeHtml(item.label)}</div>
      </button>
    `).join("");

    if (!state.selectedInstruments.length) {
      selected.innerHTML = `<div class="selected-empty">Pick the instruments you want available for this project. They will also surface on detail cards and project thumbnails.</div>`;
      return;
    }

    selected.innerHTML = `
      <div class="selected-list">
        ${state.selectedInstruments.map((id) => {
          const item = store.INSTRUMENT_LIBRARY.find((entry) => entry.id === id) || { label: id };
          return `<button class="selected-chip" type="button" data-remove-instrument="${escapeHtml(id)}">✕ ${escapeHtml(item.label)}</button>`;
        }).join("")}
      </div>
    `;
  }

  function renderKeyLibrary() {
    const finalKey = document.getElementById("finalKey")?.value || "";
    const originalKey = document.getElementById("originalKey")?.value || "";
    const theory = store.getKeyTheory(finalKey);
    const lockedDisplay = document.getElementById("locked-key-display");
    const shiftValue = document.getElementById("key-shift-value");
    const shiftCopy = document.getElementById("key-shift-copy");
    const priorityHint = document.getElementById("priority-keys-hint");

    if (lockedDisplay) {
      lockedDisplay.textContent = finalKey || "Not set";
    }
    if (shiftValue) {
      shiftValue.textContent = store.getKeyShiftLabel(originalKey, finalKey);
    }
    if (shiftCopy) {
      shiftCopy.textContent = finalKey
        ? store.getKeyShiftDescription(originalKey, finalKey)
        : "Set a locked key to show the interval shift";
    }
    if (priorityHint) {
      priorityHint.textContent = state.priorityKeys.join(" · ");
    }

    const scaleNotes = document.getElementById("scale-notes-list");
    const primaryChords = document.getElementById("primary-chords-list");
    const diatonicChords = document.getElementById("diatonic-chords-list");
    if (!scaleNotes || !primaryChords || !diatonicChords) return;

    if (!theory) {
      scaleNotes.innerHTML = `<div class="selected-empty" style="min-height:90px;">Select a locked key to build the matching note and harmony library.</div>`;
      primaryChords.innerHTML = `<div class="selected-empty" style="min-height:90px;">Primary harmony will appear here.</div>`;
      diatonicChords.innerHTML = `<div class="selected-empty" style="min-height:90px;">Diatonic chord family will appear here.</div>`;
      return;
    }

    scaleNotes.innerHTML = theory.scaleNotes.map((note) => `<span class="theory-chip">${escapeHtml(note)}</span>`).join("");
    primaryChords.innerHTML = theory.primaryChords.map((note) => `<span class="theory-chip">${escapeHtml(note)}</span>`).join("");
    diatonicChords.innerHTML = theory.diatonicChords.map((note) => `<span class="theory-chip">${escapeHtml(note)}</span>`).join("");
  }

  function renderSheetList(source) {
    const list = document.getElementById(`sheet-list-${source}`);
    if (!list) return;
    const entries = state.sheetImages[source] || [];

    if (!entries.length) {
      list.innerHTML = `<div class="sheet-empty">Add a ${SOURCE_LABELS[source]} source and any related sheet images here. Saved items will flow back into the project detail page.</div>`;
      return;
    }

    list.innerHTML = entries.map((entry, entryIndex) => `
      <article class="sheet-entry-card">
        <div class="sheet-entry-row">
          <div class="field">
            <label class="sheet-entry-label">Label</label>
            <input class="input" type="text" value="${escapeHtml(entry.label || "")}" data-sheet-input="${source}" data-sheet-index="${entryIndex}" data-sheet-field="label" placeholder="${SOURCE_LABELS[source]} item">
          </div>
          <div class="field">
            <label class="sheet-entry-label">Link</label>
            <input class="input" type="url" value="${escapeHtml(entry.url || "")}" data-sheet-input="${source}" data-sheet-index="${entryIndex}" data-sheet-field="url" placeholder="https://...">
          </div>
          <button class="mini-icon-btn" type="button" data-remove-sheet="${source}" data-remove-sheet-index="${entryIndex}" title="Remove item">
            <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
              <path d="M2 2l8 8M10 2L2 10" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
            </svg>
          </button>
        </div>
        ${Array.isArray(entry.images) && entry.images.length ? `
          <div class="sheet-thumb-area">
            ${entry.images.map((imageSrc, imageIndex) => `
              <div class="sheet-thumb">
                <img src="${imageSrc}" alt="${escapeHtml(entry.label || SOURCE_LABELS[source])}" data-preview-image="${imageSrc}" data-preview-title="${escapeHtml(entry.label || SOURCE_LABELS[source])}">
                <button class="sheet-thumb-del" type="button" data-remove-sheet-image="${source}" data-remove-sheet-index="${entryIndex}" data-remove-image-index="${imageIndex}">×</button>
              </div>
            `).join("")}
          </div>
        ` : ""}
        <label class="sheet-upload">
          <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
            <path d="M6 9V2M3.5 4.5L6 2l2.5 2.5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M2 10h8" stroke="currentColor" stroke-width="1.4" stroke-linecap="round"/>
          </svg>
          Add Sheet Image
          <input type="file" accept="image/*" multiple data-upload-sheet="${source}" data-upload-sheet-index="${entryIndex}">
        </label>
      </article>
    `).join("");
  }

  function renderAllSheetLists() {
    ["musescore", "youtube", "website"].forEach(renderSheetList);
  }

  function openImageViewer(src, title) {
    document.getElementById("image-viewer-image").src = src;
    document.getElementById("image-viewer-title").textContent = title || "Sheet Preview";
    document.getElementById("image-viewer").hidden = false;
  }

  function closeImageViewer() {
    document.getElementById("image-viewer").hidden = true;
  }

  function openThumbnailUrlModal() {
    const modal = document.getElementById("thumbnail-url-modal");
    const input = document.getElementById("thumbnail-url-input");
    const preview = document.getElementById("thumbnail-url-preview");
    const feedback = document.getElementById("thumbnail-url-feedback");
    state.thumbnailUrlPreview = "";
    input.value = "";
    preview.src = store.getThumbnail(state.project);
    feedback.textContent = "Paste a direct image URL to preview it before applying.";
    modal.hidden = false;
    setTimeout(() => input.focus(), 50);
  }

  function closeThumbnailUrlModal() {
    document.getElementById("thumbnail-url-modal").hidden = true;
  }

  function previewThumbnailUrl(url) {
    const preview = document.getElementById("thumbnail-url-preview");
    const feedback = document.getElementById("thumbnail-url-feedback");
    const trimmed = String(url || "").trim();
    if (!trimmed) {
      state.thumbnailUrlPreview = "";
      preview.src = store.getThumbnail(state.project);
      feedback.textContent = "Paste a direct image URL to preview it before applying.";
      return;
    }

    const img = new Image();
    img.onload = () => {
      state.thumbnailUrlPreview = trimmed;
      preview.src = trimmed;
      feedback.textContent = "Preview loaded. Apply it to use this image as the project thumbnail.";
    };
    img.onerror = () => {
      state.thumbnailUrlPreview = "";
      feedback.textContent = "Could not load that image. Try a direct image URL instead.";
    };
    img.src = trimmed;
  }

  async function handleThumbnailInput(event) {
    const file = event.target.files?.[0];
    if (!file) return;
    state.thumbnail = await store.readFileAsDataUrl(file);
    renderThumbnail();
    event.target.value = "";
  }

  function setActiveTab(tabId) {
    state.activeTab = tabId;
    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.classList.toggle("is-active", button.getAttribute("data-tab") === tabId);
    });
    document.querySelectorAll(".tab-panel").forEach((panel) => {
      panel.hidden = panel.id !== tabId;
    });
  }

  function toggleInstrumentSelection(id) {
    if (state.selectedInstruments.includes(id)) {
      state.selectedInstruments = state.selectedInstruments.filter((item) => item !== id);
    } else {
      state.selectedInstruments = state.selectedInstruments.concat(id);
    }
    renderInstrumentPicker();
  }

  function fillForm(project) {
    state.thumbnail = project.thumbnail || "";
    state.selectedInstruments = Array.isArray(project.music.selectedInstruments)
      ? project.music.selectedInstruments.slice()
      : [];
    state.priorityKeys = (project.songWorkflow.masterKey.priorityKeys || []).length
      ? project.songWorkflow.masterKey.priorityKeys.slice()
      : DEFAULT_PRIORITY_KEYS.slice();
    state.youtubeReferences = Array.isArray(project.youtubeReferences)
      ? project.youtubeReferences.slice()
      : [];
    state.sheetImages = {
      musescore: ((project.songWorkflow.sourceLibrary.sheetImages || {}).musescore || []).map((entry) => ({
        label: entry.label || "",
        url: entry.url || "",
        images: Array.isArray(entry.images) ? entry.images.slice() : []
      })),
      youtube: ((project.songWorkflow.sourceLibrary.sheetImages || {}).youtube || []).map((entry) => ({
        label: entry.label || "",
        url: entry.url || "",
        images: Array.isArray(entry.images) ? entry.images.slice() : []
      })),
      website: ((project.songWorkflow.sourceLibrary.sheetImages || {}).website || []).map((entry) => ({
        label: entry.label || "",
        url: entry.url || "",
        images: Array.isArray(entry.images) ? entry.images.slice() : []
      }))
    };

    document.getElementById("back-link").href = store.getDetailUrl(project.id);
    document.getElementById("edit-heading").textContent = project.title || "Edit Project";
    document.getElementById("page-title").textContent = `Edit · ${project.title}`;

    document.getElementById("title").value = project.title || "";
    document.getElementById("status").value = project.status || "Draft";
    document.getElementById("deadline").value = project.deadline || "";
    document.getElementById("project-status-note").value = project.production?.audio?.iterationLoop || "";

    document.getElementById("originalKey").value = project.songWorkflow.masterKey.originalKey || "";
    document.getElementById("finalKey").value = project.songWorkflow.masterKey.finalKey || "";
    document.getElementById("harmonySources").value = store.linksToMultiline(project.songWorkflow.sourceLibrary.harmonySources || []);
    document.getElementById("additionalSources").value = store.linksToMultiline(project.songWorkflow.sourceLibrary.additionalSources || []);

    document.getElementById("scoreOrder").value = (project.production.audio.scoreOrder || []).join(", ");
    document.getElementById("audioSheetReferences").value = store.linksToMultiline(project.production.audio.sheetReferences || []);
    document.getElementById("arrangementNotes").value = project.music.arrangementNotes || "";
    document.getElementById("recordingNotes").value = project.music.recordingNotes || "";
    document.getElementById("audioWorkflowNotes").value = project.production.audio.workflowNotes || "";
    document.getElementById("audioIterationLoop").value = project.production.audio.iterationLoop || "";
    document.getElementById("audioManualNotes").value = project.production.audio.manualNotes || "";
    document.getElementById("musicTasks").value = store.joinMultiline(project.music.musicTasks || []);

    document.getElementById("concept").value = project.visual.concept || "";
    document.getElementById("location").value = project.visual.location || "";
    document.getElementById("wardrobe").value = project.visual.wardrobe || "";
    document.getElementById("lighting").value = project.visual.lighting || "";
    document.getElementById("shotDirection").value = project.visual.shotDirection || "";
    document.getElementById("imageWorkflowNotes").value = project.production.image.workflowNotes || "";
    document.getElementById("imageReferenceFrames").value = store.linksToMultiline(project.production.image.referenceFrames || []);
    document.getElementById("imageDeliveryNotes").value = project.production.image.deliveryNotes || "";
    document.getElementById("visualTasks").value = store.joinMultiline(project.visual.visualTasks || []);
    document.getElementById("youtubeReferences").value = store.joinMultiline(project.youtubeReferences || []);

    document.querySelectorAll("[data-audio-toggle]").forEach((button) => {
      const field = button.getAttribute("data-audio-toggle");
      const selected = Boolean(project.production.audio[field]);
      button.classList.toggle("is-selected", selected);
      button.setAttribute("aria-pressed", selected ? "true" : "false");
    });

    renderThumbnail();
    renderInstrumentPicker();
    renderKeyLibrary();
    renderAllSheetLists();
  }

  function buildSheetSourcePayload(source) {
    return (state.sheetImages[source] || [])
      .filter((entry) => entry.label || entry.url || (entry.images || []).length)
      .map((entry) => ({
        label: String(entry.label || SOURCE_LABELS[source]).trim() || SOURCE_LABELS[source],
        url: String(entry.url || "").trim(),
        images: Array.isArray(entry.images) ? entry.images.slice() : []
      }));
  }

  function buildPayload() {
    const title = document.getElementById("title").value.trim();
    const status = document.getElementById("status").value;
    const audioToggleState = Object.fromEntries(
      Array.from(document.querySelectorAll("[data-audio-toggle]")).map((button) => [
        button.getAttribute("data-audio-toggle"),
        button.classList.contains("is-selected")
      ])
    );

    return {
      id: state.project.id,
      title,
      author: state.project.author || "The Flutiano",
      status,
      progress: status === "Released" ? 100 : status === "In Progress" ? 58 : status === "Active" ? 38 : 12,
      deadline: document.getElementById("deadline").value,
      category: state.project.category || "Cover",
      shortDescription: "",
      thumbnail: state.thumbnail,
      gallery: Array.isArray(state.project.gallery) ? state.project.gallery : [],
      music: {
        arrangementNotes: document.getElementById("arrangementNotes").value.trim(),
        instrumentation: state.selectedInstruments.join(", "),
        recordingNotes: document.getElementById("recordingNotes").value.trim(),
        selectedInstruments: state.selectedInstruments.slice(),
        musicTasks: store.splitMultiline(document.getElementById("musicTasks").value)
      },
      visual: {
        concept: document.getElementById("concept").value.trim(),
        location: document.getElementById("location").value.trim(),
        wardrobe: document.getElementById("wardrobe").value.trim(),
        lighting: document.getElementById("lighting").value.trim(),
        shotDirection: document.getElementById("shotDirection").value.trim(),
        visualTasks: store.splitMultiline(document.getElementById("visualTasks").value)
      },
      inspiration: {
        coreMood: state.project.inspiration?.coreMood || "",
        referenceNotes: ""
      },
      references: {
        links: Array.isArray(state.project.references?.links) ? state.project.references.links : []
      },
      youtubeReferences: store.splitMultiline(document.getElementById("youtubeReferences").value),
      notes: "",
      production: {
        audio: {
          scoreOrder: document.getElementById("scoreOrder").value
            .split(",")
            .map((item) => item.trim())
            .filter(Boolean),
          supportsMidiInput: Boolean(audioToggleState.supportsMidiInput),
          supportsXmlImport: Boolean(audioToggleState.supportsXmlImport),
          sheetReferences: store.parseLinkLines(document.getElementById("audioSheetReferences").value),
          workflowNotes: document.getElementById("audioWorkflowNotes").value.trim(),
          iterationLoop: document.getElementById("audioIterationLoop").value.trim() || document.getElementById("project-status-note").value.trim(),
          manualNotes: document.getElementById("audioManualNotes").value.trim()
        },
        image: {
          workflowNotes: document.getElementById("imageWorkflowNotes").value.trim(),
          referenceFrames: store.parseLinkLines(document.getElementById("imageReferenceFrames").value),
          deliveryNotes: document.getElementById("imageDeliveryNotes").value.trim()
        }
      },
      songWorkflow: {
        masterKey: {
          originalKey: document.getElementById("originalKey").value,
          priorityKeys: state.priorityKeys.slice(),
          finalKey: document.getElementById("finalKey").value
        },
        sourceLibrary: {
          sheetSources: buildSheetSourcePayload("musescore")
            .filter((entry) => entry.url)
            .map((entry) => ({ label: entry.label, url: entry.url })),
          harmonySources: store.parseLinkLines(document.getElementById("harmonySources").value),
          audioReferences: buildSheetSourcePayload("youtube")
            .filter((entry) => entry.url)
            .map((entry) => ({ label: entry.label, url: entry.url })),
          additionalSources: buildSheetSourcePayload("website")
            .filter((entry) => entry.url)
            .map((entry) => ({ label: entry.label, url: entry.url }))
            .concat(store.parseLinkLines(document.getElementById("additionalSources").value)),
          sheetImages: {
            musescore: buildSheetSourcePayload("musescore"),
            youtube: buildSheetSourcePayload("youtube"),
            website: buildSheetSourcePayload("website")
          }
        }
      },
      todos: Array.isArray(state.project.todos) ? state.project.todos : []
    };
  }

  function saveProject() {
    const payload = buildPayload();
    if (!payload.title) {
      document.getElementById("title").focus();
      return;
    }
    const saved = store.upsertProject(payload);
    window.location.href = store.getDetailUrl(saved.id);
  }

  function revealHashTarget() {
    const hash = window.location.hash.replace(/^#/, "");
    if (!hash) return;

    const tabMap = {
      "workflow-step-1": "tab-workflow",
      "workflow-step-2": "tab-workflow",
      "tab-audio": "tab-audio",
      "tab-image": "tab-image"
    };

    const nextTab = tabMap[hash];
    if (nextTab) {
      setActiveTab(nextTab);
    }

    const target = document.getElementById(hash);
    if (target) {
      requestAnimationFrame(() => {
        target.scrollIntoView({ behavior: "smooth", block: "start" });
      });
    }
  }

  function bindEvents() {
    document.getElementById("thumbnail-input").addEventListener("change", handleThumbnailInput);
    document.getElementById("thumbnail-upload-btn").addEventListener("click", () => {
      document.getElementById("thumbnail-input").click();
    });
    document.getElementById("thumbnail-reset-btn").addEventListener("click", () => {
      state.thumbnail = "";
      renderThumbnail();
    });
    document.getElementById("thumbnail-url-btn").addEventListener("click", openThumbnailUrlModal);
    document.getElementById("thumbnail-url-close").addEventListener("click", closeThumbnailUrlModal);
    document.getElementById("thumbnail-url-cancel").addEventListener("click", closeThumbnailUrlModal);
    document.getElementById("thumbnail-url-input").addEventListener("input", (event) => {
      previewThumbnailUrl(event.target.value);
    });
    document.getElementById("thumbnail-url-apply").addEventListener("click", () => {
      if (!state.thumbnailUrlPreview) return;
      state.thumbnail = state.thumbnailUrlPreview;
      renderThumbnail();
      closeThumbnailUrlModal();
    });
    document.getElementById("thumbnail-url-modal").addEventListener("click", (event) => {
      if (event.target === event.currentTarget) {
        closeThumbnailUrlModal();
      }
    });

    document.getElementById("image-viewer-close").addEventListener("click", closeImageViewer);
    document.getElementById("image-viewer").addEventListener("click", (event) => {
      if (event.target === event.currentTarget) {
        closeImageViewer();
      }
    });

    document.querySelectorAll("[data-tab]").forEach((button) => {
      button.addEventListener("click", () => setActiveTab(button.getAttribute("data-tab")));
    });

    document.getElementById("finalKey").addEventListener("change", renderKeyLibrary);
    document.getElementById("originalKey").addEventListener("change", renderKeyLibrary);

    document.addEventListener("click", (event) => {
      const instrumentButton = event.target.closest("[data-instrument]");
      if (instrumentButton) {
        toggleInstrumentSelection(instrumentButton.getAttribute("data-instrument"));
        return;
      }

      const removeInstrumentButton = event.target.closest("[data-remove-instrument]");
      if (removeInstrumentButton) {
        toggleInstrumentSelection(removeInstrumentButton.getAttribute("data-remove-instrument"));
        return;
      }

      const addSheetButton = event.target.closest("[data-add-sheet]");
      if (addSheetButton) {
        const source = addSheetButton.getAttribute("data-add-sheet");
        state.sheetImages[source].push({ label: "", url: "", images: [] });
        renderSheetList(source);
        return;
      }

      const removeSheetButton = event.target.closest("[data-remove-sheet]");
      if (removeSheetButton) {
        const source = removeSheetButton.getAttribute("data-remove-sheet");
        const index = Number(removeSheetButton.getAttribute("data-remove-sheet-index"));
        state.sheetImages[source].splice(index, 1);
        renderSheetList(source);
        return;
      }

      const removeSheetImageButton = event.target.closest("[data-remove-sheet-image]");
      if (removeSheetImageButton) {
        const source = removeSheetImageButton.getAttribute("data-remove-sheet-image");
        const entryIndex = Number(removeSheetImageButton.getAttribute("data-remove-sheet-index"));
        const imageIndex = Number(removeSheetImageButton.getAttribute("data-remove-image-index"));
        state.sheetImages[source][entryIndex].images.splice(imageIndex, 1);
        renderSheetList(source);
        return;
      }

      const previewImage = event.target.closest("[data-preview-image]");
      if (previewImage) {
        openImageViewer(
          previewImage.getAttribute("data-preview-image"),
          previewImage.getAttribute("data-preview-title")
        );
        return;
      }

      const audioToggle = event.target.closest("[data-audio-toggle]");
      if (audioToggle) {
        audioToggle.classList.toggle("is-selected");
        audioToggle.setAttribute("aria-pressed", audioToggle.classList.contains("is-selected") ? "true" : "false");
      }
    });

    document.addEventListener("input", (event) => {
      const sheetInput = event.target.closest("[data-sheet-input]");
      if (sheetInput) {
        const source = sheetInput.getAttribute("data-sheet-input");
        const index = Number(sheetInput.getAttribute("data-sheet-index"));
        const field = sheetInput.getAttribute("data-sheet-field");
        state.sheetImages[source][index][field] = sheetInput.value;
      }
    });

    document.addEventListener("change", async (event) => {
      const uploadInput = event.target.closest("[data-upload-sheet]");
      if (!uploadInput) return;
      const source = uploadInput.getAttribute("data-upload-sheet");
      const index = Number(uploadInput.getAttribute("data-upload-sheet-index"));
      const files = Array.from(uploadInput.files || []);
      if (!files.length) return;
      const images = await store.readFilesAsDataUrls(files);
      state.sheetImages[source][index].images = state.sheetImages[source][index].images.concat(images);
      renderSheetList(source);
      uploadInput.value = "";
    });

    document.getElementById("save-edit").addEventListener("click", saveProject);
    document.getElementById("cancel-edit").addEventListener("click", () => {
      window.location.href = store.getDetailUrl(state.project.id);
    });
  }

  function initEditPage() {
    const project = getCurrentProject();
    const root = document.getElementById("edit-root");

    if (!project) {
      root.innerHTML = `
        <section class="tab-panel">
          <div class="section-title">Project not found</div>
          <div class="section-copy">Return to Projects and open a valid item first.</div>
        </section>
      `;
      return;
    }

    state.project = project;
    document.title = `The Flutiano — Edit ${project.title}`;
    root.innerHTML = sectionTemplate();
    populateKeySelect("originalKey");
    populateKeySelect("finalKey");
    fillForm(project);
    bindEvents();
    document.getElementById("sticky-submit").style.display = "inline-flex";
    revealHashTarget();
  }

  initEditPage();
</script>
</body>
</html>
