    <text x="-154" y="12" fill="#E9C98E" font-family="Manrope, Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0.14em">IDEAS</text>
    <text x="-14" y="12" fill="#AEB7C2" font-family="Manrope, Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0.14em">CANDIDATES</text>
    <text x="160" y="12" fill="#E9C98E" font-family="Manrope, Inter, Arial, sans-serif" font-size="21" font-weight="800" letter-spacing="0.14em">POTENTIAL</text>
