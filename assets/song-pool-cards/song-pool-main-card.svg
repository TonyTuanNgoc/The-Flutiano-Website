  <text x="800" y="246" text-anchor="middle" fill="url(#goldLine)" font-family="Sora, Manrope, Inter, Arial, sans-serif" font-size="76" font-weight="700" letter-spacing="0.12em">SONG POOL</text>
  <text x="800" y="304" text-anchor="middle" fill="#B0B8C2" font-family="Manrope, Inter, Arial, sans-serif" font-size="24" font-weight="700" letter-spacing="0.22em">IDEAS  /  CANDIDATES  /  POTENTIAL</text>

