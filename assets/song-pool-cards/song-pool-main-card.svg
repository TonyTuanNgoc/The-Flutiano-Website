    <circle cx="1116" cy="430" r="14" fill="url(#goldLine)"/>
    <circle cx="964" cy="560" r="18" fill="url(#goldLine)"/>
    <circle cx="790" cy="726" r="16" fill="url(#goldLine)"/>
    <circle cx="620" cy="582" r="12" fill="rgba(233,201,143,0.56)"/>
    <circle cx="1014" cy="930" r="12" fill="rgba(233,201,143,0.52)"/>
    <circle cx="340" cy="852" r="10" fill="rgba(233,201,143,0.32)"/>
    <circle cx="414" cy="1060" r="10" fill="rgba(233,201,143,0.30)"/>
