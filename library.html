<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flutiano — Library</title>
<link rel="stylesheet" href="shared.css">
<style>
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 34px 38px 48px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .library-panel {
    background: linear-gradient(180deg, rgba(17,22,29,0.48) 0%, rgba(11,15,21,0.32) 100%);
    backdrop-filter: blur(24px) saturate(145%);
    -webkit-backdrop-filter: blur(24px) saturate(145%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: var(--r);
    box-shadow:
      0 20px 48px rgba(4,7,12,0.22),
      inset 0 1px 0 rgba(255,255,255,0.05);
    padding: 24px;
  }

  .library-shell {
    display: grid;
    grid-template-columns: minmax(0, 1.2fr) minmax(280px, 0.9fr);
    gap: 18px;
  }

  .library-lead {
    padding: 26px;
    border-radius: 22px;
    border: 1px solid rgba(255,255,255,0.10);
    background:
      radial-gradient(circle at top right, rgba(212,170,106,0.12), transparent 35%),
      rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 22px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.62);
    line-height: 1;
  }

  .library-lead .section-title {
    font-size: 32px;
    line-height: 1.04;
    letter-spacing: -0.05em;
    text-transform: none;
    color: #FFFFFF;
    font-family: "Sora", "Manrope", sans-serif;
    font-weight: 600;
  }

  .library-copy {
    margin-top: 12px;
    color: rgba(255,255,255,0.52);
    font-size: 13px;
    line-height: 1.72;
    font-weight: 700;
  }

  .library-total {
    display: inline-flex;
    flex-direction: column;
    gap: 6px;
    align-items: flex-start;
  }

  .library-total strong {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 46px;
    line-height: 1;
    letter-spacing: -0.08em;
    color: var(--gold-hi);
  }

  .library-total span {
    color: rgba(255,255,255,0.42);
    font-size: 11px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    font-weight: 800;
  }

  .library-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .library-tile {
    padding: 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .library-tile-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .library-icon {
    width: 38px;
    height: 38px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #FFFFFF;
    font-size: 16px;
    flex-shrink: 0;
  }

  .library-count {
    font-size: 24px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: #FFFFFF;
    font-weight: 800;
  }

  .library-tile strong {
    display: block;
    font-size: 13px;
    line-height: 1.4;
    color: #FFFFFF;
    font-weight: 800;
  }

  .library-tile p {
    font-size: 11px;
    line-height: 1.58;
    color: rgba(255,255,255,0.48);
    font-weight: 700;
  }

  @media (max-width: 980px) {
    .content { padding: 24px 20px 36px; }
    .library-shell,
    .library-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="main-wrap">
  <div class="topbar">
    <span class="page-title">Library</span>
    <span class="topbar-sub">— one destination for the connected reference system</span>
    <div class="topbar-spacer"></div>
  </div>

  <div class="content">
    <div class="library-panel" id="creative-library"></div>
  </div>
</div>

<script src="project-store.js"></script>
<script>
  const store = window.FlutianoProjectStore;

  function renderCreativeLibrary(projects) {
    const libraryCounts = projects.reduce((accumulator, project) => {
      const workflow = store.getSongWorkflowState(project);
      accumulator.sheet += workflow.sourceLibrary.sheetCount;
      accumulator.harmony += workflow.sourceLibrary.harmonyCount;
      accumulator.audio += workflow.sourceLibrary.audioCount;
      accumulator.additional += workflow.sourceLibrary.additionalCount;
      return accumulator;
    }, { sheet: 0, harmony: 0, audio: 0, additional: 0 });

    const total = libraryCounts.sheet + libraryCounts.harmony + libraryCounts.audio + libraryCounts.additional;

    document.getElementById("creative-library").innerHTML = `
      <div class="library-shell">
        <div class="library-lead">
          <div>
            <div class="section-title">Creative Library</div>
            <div class="library-copy">A stronger source overview for the whole system, so sheet material, harmony references, listening references, and extra support links are visible at a glance.</div>
          </div>
          <div class="library-total">
            <strong>${total}</strong>
            <span>Total linked sources</span>
          </div>
        </div>

        <div class="library-grid">
          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">𝄞</span>
              <span class="library-count">${libraryCounts.sheet}</span>
            </div>
            <div>
              <strong>Sheet Sources</strong>
              <p>Reference scores and notation pulled into active projects.</p>
            </div>
          </article>

          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">♬</span>
              <span class="library-count">${libraryCounts.harmony}</span>
            </div>
            <div>
              <strong>Harmony Sources</strong>
              <p>Chord and harmonic references guiding arrangement decisions.</p>
            </div>
          </article>

          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">▶</span>
              <span class="library-count">${libraryCounts.audio}</span>
            </div>
            <div>
              <strong>Audio References</strong>
              <p>Listening examples collected for performance, feel, and production tone.</p>
            </div>
          </article>

          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">✧</span>
              <span class="library-count">${libraryCounts.additional}</span>
            </div>
            <div>
              <strong>Additional Sources</strong>
              <p>Extra links that support concept shaping and creative development.</p>
            </div>
          </article>
        </div>
      </div>
    `;
  }

  function renderLibraryPage() {
    renderCreativeLibrary(store.getProjects());
  }

  window.addEventListener(store.TODO_UPDATE_EVENT, renderLibraryPage);
  window.addEventListener("storage", (event) => {
    if (!event.key || event.key === store.STORAGE_KEY) {
      renderLibraryPage();
    }
  });

  renderLibraryPage();
</script>
</body>
