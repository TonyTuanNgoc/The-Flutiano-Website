<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flutiano — Project Visual</title>
<link rel="stylesheet" href="shared.css">
<style>
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 34px 38px 52px;
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .hero-card,
  .panel {
    background: linear-gradient(180deg, rgba(17,22,29,0.48) 0%, rgba(10,14,20,0.30) 100%);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: var(--r);
    backdrop-filter: blur(22px) saturate(150%);
    -webkit-backdrop-filter: blur(22px) saturate(150%);
    box-shadow:
      0 18px 52px rgba(4,7,12,0.18),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .hero-card {
    display: grid;
    grid-template-columns: 320px minmax(0, 1fr);
    overflow: hidden;
  }

  .hero-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .hero-body {
    padding: 28px 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .eyebrow {
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.40);
    font-weight: 800;
  }

  .hero-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .hero-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 34px;
    line-height: 1.04;
    letter-spacing: -0.05em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .hero-sub {
    margin-top: 8px;
    font-size: 13px;
    line-height: 1.65;
    color: var(--t2);
    max-width: 680px;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
  }

  .back-btn,
  .edit-btn {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 15px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 12px;
    font-weight: 800;
    transition: transform 0.15s, border-color 0.15s, background 0.15s, color 0.15s;
  }

  .back-btn {
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.72);
  }

  .back-btn:hover {
    transform: translateY(-1px);
    color: #FFFFFF;
    border-color: rgba(255,255,255,0.18);
  }

  .edit-btn {
    background: rgba(212,170,106,0.16);
    border-color: rgba(212,170,106,0.26);
    color: var(--gold-hi);
  }

  .edit-btn:hover {
    transform: translateY(-1px);
    background: rgba(212,170,106,0.20);
    border-color: rgba(212,170,106,0.34);
  }

  .layout {
    display: grid;
    grid-template-columns: 0.95fr 1.05fr;
    gap: 16px;
  }

  .panel {
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .panel-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 22px;
    line-height: 1.1;
    letter-spacing: -0.04em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .field-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .field-card {
    padding: 16px;
    border-radius: 18px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
  }

  .field-card span {
    display: block;
    font-size: 9px;
    letter-spacing: 0.14em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.38);
    font-weight: 800;
    margin-bottom: 8px;
  }

  .field-card p,
  .field-card li {
    font-size: 13px;
    line-height: 1.7;
    color: var(--t2);
  }

  .task-list {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-list li {
    position: relative;
    padding-left: 16px;
  }

  .task-list li::before {
    content: "";
    position: absolute;
    left: 0;
    top: 8px;
    width: 6px;
    height: 6px;
    border-radius: 50%;
    background: var(--gold);
    opacity: 0.82;
  }

  .gallery-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .gallery-grid img {
    width: 100%;
    aspect-ratio: 1 / 0.82;
    object-fit: cover;
    display: block;
    border-radius: 18px;
    background: rgba(255,255,255,0.04);
  }

  .empty {
    padding: 16px;
    border-radius: 16px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.08);
    font-size: 13px;
    line-height: 1.65;
    color: var(--t3);
  }

  @media (max-width: 1180px) {
    .layout,
    .hero-card,
    .field-grid {
      grid-template-columns: 1fr;
    }
  }

  @media (max-width: 760px) {
    .content {
      padding: 24px 20px 36px;
    }

    .hero-body,
    .panel {
      padding: 22px 20px;
    }

    .hero-top {
      flex-direction: column;
      align-items: flex-start;
    }

    .hero-title {
      font-size: 28px;
    }

    .gallery-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

<div class="main-wrap">
  <div class="topbar">
    <span class="page-title" id="page-title">Visual</span>
    <span class="topbar-sub">— dedicated visual workspace</span>
    <div class="topbar-spacer"></div>
  </div>

  <div class="content" id="visual-root"></div>
</div>

<script src="project-store.js"></script>
<script>
  const store = window.FlutianoProjectStore;

  function renderVisualPage(project) {
    return `
      <section class="hero-card">
        <div class="hero-media">
          <img src="${store.getThumbnail(project)}" alt="${project.title}">
        </div>
        <div class="hero-body">
          <div class="eyebrow">Visual</div>
          <div class="hero-top">
            <div>
              <h1 class="hero-title">${project.title}</h1>
              <p class="hero-sub">${project.visual.concept}</p>
            </div>
            <div class="hero-actions">
              <a class="back-btn" href="${store.getDetailUrl(project.id)}">
                <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
                  <path d="M10 6H2M6 2L2 6l4 4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
                </svg>
                Back to Project
              </a>
              <a class="edit-btn" href="${store.getEditUrl(project.id)}">
                <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                  <path d="M3 10.2V11h.8L9.9 4.9 9.1 4.1 3 10.2Z" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                  <path d="M8.2 3.3l.9-.9a1 1 0 011.4 0l.8.8a1 1 0 010 1.4l-.9.9" stroke="currentColor" stroke-width="1.3" stroke-linejoin="round"/>
                </svg>
                Edit
              </a>
            </div>
          </div>
        </div>
      </section>

      <div class="layout">
        <section class="panel">
          <div class="panel-title">Visual Direction</div>
          <div class="field-grid">
            <div class="field-card">
              <span>Concept</span>
              <p>${project.visual.concept}</p>
            </div>
            <div class="field-card">
              <span>Location</span>
              <p>${project.visual.location}</p>
            </div>
            <div class="field-card">
              <span>Wardrobe</span>
              <p>${project.visual.wardrobe}</p>
            </div>
            <div class="field-card">
              <span>Lighting</span>
              <p>${project.visual.lighting}</p>
            </div>
            <div class="field-card" style="grid-column:1 / -1;">
              <span>Shot Direction</span>
              <p>${project.visual.shotDirection}</p>
            </div>
          </div>
        </section>

        <section class="panel">
          <div class="panel-title">Visual Tasks</div>
          ${project.visual.visualTasks.length
            ? `<ul class="task-list">${project.visual.visualTasks.map((task) => `<li>${task}</li>`).join("")}</ul>`
            : `<div class="empty">No visual tasks yet.</div>`}
        </section>
      </div>

      <section class="panel">
        <div class="panel-title">Gallery</div>
        ${store.getGallery(project).length
          ? `<div class="gallery-grid">${store.getGallery(project).map((image) => `<img src="${image}" alt="Gallery image">`).join("")}</div>`
          : `<div class="empty">No gallery images yet.</div>`}
      </section>
    `;
  }

  function renderNotFound() {
    return `<section class="panel"><div class="panel-title">Project not found</div><div class="empty">Return to Projects and open a valid item.</div></section>`;
  }

  function initVisualPage() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("project");
    const project = store.getProject(id) || (!id ? store.getDefaultProject() : null);
    const root = document.getElementById("visual-root");

    if (!project) {
      root.innerHTML = renderNotFound();
      return;
    }

    document.title = `The Flutiano — ${project.title} Visual`;
    document.getElementById("page-title").textContent = `${project.title} · Visual`;
    root.innerHTML = renderVisualPage(project);
  }

  initVisualPage();
</script>
</body>
