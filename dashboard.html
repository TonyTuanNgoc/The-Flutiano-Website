<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flutiano — Dashboard</title>
<link rel="stylesheet" href="shared.css">
<style>
  .bg-art::before {
    background:
      linear-gradient(118deg, rgba(4,7,12,0.88) 0%, rgba(7,10,15,0.56) 36%, rgba(22,15,11,0.64) 100%),
      linear-gradient(180deg, rgba(4,6,9,0.18) 0%, rgba(4,6,9,0.82) 100%),
      url("assets/dashboard-hero-piano.jpg") center 74% / cover no-repeat;
    filter: saturate(0.7) brightness(0.46) blur(0.8px);
    transform: scale(1.035);
  }

  .bg-art::after {
    background:
      radial-gradient(ellipse 70% 66% at 82% 12%, rgba(237,180,109,0.15) 0%, transparent 54%),
      radial-gradient(ellipse 52% 58% at 18% 88%, rgba(58,92,106,0.14) 0%, transparent 55%),
      linear-gradient(180deg, rgba(2,4,7,0.08) 0%, rgba(2,4,7,0.48) 100%);
    opacity: 0.94;
  }

  .content {
    flex: 1;
    overflow-y: auto;
    padding: 34px 38px 48px;
    display: flex;
    flex-direction: column;
    gap: 26px;
  }

  .section-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 16px;
    margin-bottom: 16px;
  }

  .section-title {
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.62);
    line-height: 1;
  }

  .section-meta,
  .see-all {
    font-size: 11px;
    color: rgba(255,255,255,0.48);
    font-weight: 700;
  }

  .see-all {
    color: var(--gold-hi);
    transition: opacity 0.13s, transform 0.13s;
  }

  .see-all:hover {
    opacity: 1;
    transform: translateX(1px);
  }

  .todo-panel,
  .recent-card,
  .library-panel {
    background: linear-gradient(180deg, rgba(17,22,29,0.48) 0%, rgba(11,15,21,0.32) 100%);
    backdrop-filter: blur(24px) saturate(145%);
    -webkit-backdrop-filter: blur(24px) saturate(145%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: var(--r);
    box-shadow:
      0 20px 48px rgba(4,7,12,0.22),
      inset 0 1px 0 rgba(255,255,255,0.05);
  }

  .todo-panel,
  .library-panel {
    padding: 24px;
  }

  .qa-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 220px));
    gap: 12px;
  }

  .qa-tile {
    background: linear-gradient(180deg, rgba(20,26,34,0.34) 0%, rgba(12,17,24,0.24) 100%);
    border: 1px solid rgba(255,255,255,0.09);
    border-radius: 18px;
    padding: 18px 16px;
    display: flex;
    align-items: center;
    gap: 14px;
    text-decoration: none;
    transition: background 0.13s, border-color 0.13s, transform 0.13s, box-shadow 0.13s;
  }

  .qa-tile:hover {
    background: linear-gradient(180deg, rgba(20,26,34,0.48) 0%, rgba(12,17,24,0.32) 100%);
    border-color: rgba(255,255,255,0.14);
    transform: translateY(-2px);
    box-shadow: 0 16px 34px rgba(0,0,0,0.18);
  }

  .qa-icon {
    width: 44px;
    height: 44px;
    border-radius: 14px;
    display: flex;
    align-items: center;
    justify-content: center;
    flex-shrink: 0;
  }

  .qa-copy {
    display: flex;
    flex-direction: column;
    gap: 4px;
  }

  .qa-label {
    font-size: 13px;
    color: #FFFFFF;
    font-weight: 800;
  }

  .qa-sub {
    font-size: 11px;
    color: rgba(255,255,255,0.44);
    font-weight: 700;
  }

  .recent-grid {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 16px;
  }

  .recent-card {
    overflow: hidden;
    display: flex;
    flex-direction: column;
    cursor: pointer;
    min-width: 0;
    transition: transform 0.18s, box-shadow 0.18s, border-color 0.18s, background 0.18s;
  }

  .recent-card:hover {
    transform: translateY(-4px);
    border-color: rgba(255,255,255,0.2);
    background: linear-gradient(180deg, rgba(19,24,32,0.58) 0%, rgba(11,15,21,0.42) 100%);
    box-shadow: 0 24px 58px rgba(0,0,0,0.34);
  }

  .recent-media {
    position: relative;
    aspect-ratio: 1 / 1;
    overflow: hidden;
    background:
      radial-gradient(circle at top left, rgba(212,170,106,0.12), transparent 36%),
      rgba(7,10,15,0.78);
  }

  .recent-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    object-position: center center;
    display: block;
    transform: scale(1.01);
  }

  .recent-media::after {
    content: "";
    position: absolute;
    inset: 0;
    background:
      linear-gradient(180deg, rgba(5,8,12,0.06) 0%, rgba(5,8,12,0.24) 48%, rgba(5,8,12,0.86) 100%);
  }

  .stage-badge {
    position: absolute;
    left: 14px;
    bottom: 14px;
    z-index: 1;
    display: inline-flex;
    align-items: center;
    gap: 7px;
    padding: 6px 10px;
    border-radius: 999px;
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.10em;
    text-transform: uppercase;
    border: 1px solid rgba(255,255,255,0.14);
    backdrop-filter: blur(14px);
    -webkit-backdrop-filter: blur(14px);
  }

  .stage-badge::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .stage-badge.tone-gold {
    background: rgba(212,170,106,0.16);
    color: var(--gold-hi);
  }

  .stage-badge.tone-jade {
    background: rgba(94,201,177,0.16);
    color: #8DE8D1;
  }

  .stage-badge.tone-sky {
    background: rgba(128,191,231,0.16);
    color: #A7D9F7;
  }

  .stage-badge.tone-violet {
    background: rgba(167,139,250,0.16);
    color: #D0C1FF;
  }

  .recent-body {
    padding: 18px 18px 20px;
    display: flex;
    flex-direction: column;
    gap: 12px;
    flex: 1;
    min-width: 0;
  }

  .recent-kicker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.18em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.44);
    font-weight: 800;
  }

  .recent-kicker::before {
    content: "";
    width: 18px;
    height: 1px;
    background: rgba(212,170,106,0.42);
  }

  .recent-card-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 18px;
    line-height: 1.14;
    letter-spacing: -0.038em;
    font-weight: 600;
    color: #FFFFFF;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .recent-card-copy {
    font-size: 12px;
    line-height: 1.58;
    color: rgba(255,255,255,0.54);
    font-weight: 700;
    display: -webkit-box;
    -webkit-line-clamp: 2;
    -webkit-box-orient: vertical;
    overflow: hidden;
  }

  .recent-instruments {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .recent-instrument {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    min-width: 0;
    padding: 7px 10px;
    border-radius: 999px;
    border: 1px solid rgba(255,255,255,0.1);
    background: rgba(255,255,255,0.05);
    color: rgba(255,255,255,0.72);
    font-size: 10px;
    font-weight: 800;
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }

  .recent-instrument-icon {
    width: 18px;
    height: 18px;
    flex-shrink: 0;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    color: var(--gold-hi);
  }

  .recent-instrument-icon svg {
    width: 18px;
    height: 18px;
    stroke: currentColor;
    fill: none;
    stroke-width: 1.55;
    stroke-linecap: round;
    stroke-linejoin: round;
  }

  .recent-card-footer {
    margin-top: auto;
    padding-top: 4px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .recent-card-footnote {
    font-size: 11px;
    line-height: 1.4;
    color: rgba(255,255,255,0.42);
    font-weight: 700;
  }

  .recent-card-link {
    color: var(--gold-hi);
    font-size: 11px;
    font-weight: 800;
    letter-spacing: 0.06em;
    text-transform: uppercase;
  }

  .todo-shell {
    display: grid;
    grid-template-columns: 1.2fr 0.88fr;
    gap: 18px;
  }

  .todo-panel {
    display: flex;
    flex-direction: column;
    gap: 18px;
    min-height: 320px;
  }

  .todo-panel-head {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
  }

  .todo-panel-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 24px;
    line-height: 1.06;
    letter-spacing: -0.04em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .todo-panel-sub {
    font-size: 12px;
    color: rgba(255,255,255,0.46);
    font-weight: 700;
    margin-top: 4px;
  }

  .todo-count-pill {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-width: 34px;
    padding: 8px 10px;
    border-radius: 999px;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.10);
    color: #FFFFFF;
    font-size: 11px;
    font-weight: 800;
  }

  .todo-groups {
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .todo-group {
    padding: 16px 17px 15px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .todo-group-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .todo-group-link {
    border: 0;
    background: none;
    padding: 0;
    color: #FFFFFF;
    font-size: 14px;
    font-weight: 800;
    letter-spacing: -0.02em;
    cursor: pointer;
    text-align: left;
  }

  .todo-group-link:hover {
    color: var(--gold-hi);
  }

  .todo-group-meta {
    font-size: 10px;
    color: rgba(255,255,255,0.40);
    letter-spacing: 0.12em;
    text-transform: uppercase;
    font-weight: 800;
    white-space: nowrap;
  }

  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-row {
    display: grid;
    grid-template-columns: 18px 10px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
  }

  .task-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: background 0.13s, border-color 0.13s, transform 0.13s;
  }

  .task-check:hover {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.28);
  }

  .task-check.is-complete {
    background: rgba(94,201,177,0.20);
    border-color: rgba(94,201,177,0.34);
  }

  .task-check.is-complete::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: #8DE8D1;
  }

  .urgency-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.02);
  }

  .urgency-dot.is-red { background: #D87474; }
  .urgency-dot.is-yellow { background: #D4AA6A; }
  .urgency-dot.is-green { background: #67C5A6; }

  .task-text {
    font-size: 13px;
    line-height: 1.5;
    color: rgba(255,255,255,0.92);
    font-weight: 700;
  }

  .task-text.is-complete {
    color: rgba(255,255,255,0.46);
  }

  .empty-state {
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 180px;
    padding: 20px;
    border-radius: 18px;
    border: 1px dashed rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    font-size: 13px;
    line-height: 1.68;
    color: rgba(255,255,255,0.46);
    text-align: center;
    font-weight: 600;
  }

  .library-panel {
    position: relative;
    overflow: hidden;
  }

  .library-panel::after {
    content: "";
    position: absolute;
    inset: 0;
    pointer-events: none;
    background:
      radial-gradient(circle at top right, rgba(212,170,106,0.18), transparent 30%),
      linear-gradient(90deg, rgba(255,255,255,0.00) 0%, rgba(255,255,255,0.03) 36%, rgba(255,255,255,0.00) 100%);
  }

  .library-shell {
    position: relative;
    z-index: 1;
    display: grid;
    grid-template-columns: minmax(0, 280px) minmax(0, 1fr);
    gap: 18px;
    align-items: stretch;
  }

  .library-lead {
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    gap: 16px;
    padding: 2px 2px 2px 0;
  }

  .library-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 28px;
    line-height: 1.04;
    letter-spacing: -0.045em;
    font-weight: 600;
    color: #FFFFFF;
  }

  .library-copy {
    font-size: 13px;
    line-height: 1.7;
    color: rgba(255,255,255,0.58);
    font-weight: 700;
    max-width: 280px;
  }

  .library-total {
    display: inline-flex;
    align-items: baseline;
    gap: 8px;
  }

  .library-total strong {
    font-size: 42px;
    line-height: 1;
    letter-spacing: -0.06em;
    color: #FFFFFF;
    font-weight: 800;
  }

  .library-total span {
    font-size: 10px;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.40);
    font-weight: 800;
  }

  .library-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 12px;
  }

  .library-tile {
    padding: 16px;
    border-radius: 20px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .library-tile-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .library-icon {
    width: 38px;
    height: 38px;
    border-radius: 14px;
    display: inline-flex;
    align-items: center;
    justify-content: center;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.08);
    color: #FFFFFF;
    font-size: 16px;
    flex-shrink: 0;
  }

  .library-count {
    font-size: 24px;
    line-height: 1;
    letter-spacing: -0.04em;
    color: #FFFFFF;
    font-weight: 800;
  }

  .library-tile strong {
    display: block;
    font-size: 13px;
    line-height: 1.4;
    color: #FFFFFF;
    font-weight: 800;
  }

  .library-tile p {
    font-size: 11px;
    line-height: 1.58;
    color: rgba(255,255,255,0.48);
    font-weight: 700;
  }

  @media (max-width: 1420px) {
    .recent-grid {
      grid-template-columns: repeat(3, minmax(0, 1fr));
    }
  }

  @media (max-width: 1180px) {
    .recent-grid,
    .todo-shell,
    .library-shell,
    .library-grid {
      grid-template-columns: repeat(2, minmax(0, 1fr));
    }

    .library-lead {
      grid-column: 1 / -1;
    }
  }

  @media (max-width: 860px) {
    .content {
      padding: 24px 20px 36px;
    }

    .qa-grid,
    .recent-grid,
    .todo-shell,
    .library-shell,
    .library-grid {
      grid-template-columns: 1fr;
    }
  }
</style>
</head>

        <path d="M2 6v6.5a1 1 0 001 1h9a1 1 0 001-1V6" stroke="currentColor" stroke-width="1.3"/>
        <path d="M5.5 9h4" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/>
      </svg>
      Archive
    </a>
  </div>

  <div class="sidebar-footer">
    <div class="avatar">F</div>
    <div class="user-info">
      <div class="user-name">Flutiano</div>
      <div class="user-role">Artist &amp; Producer</div>
    </div>
    <svg width="12" height="12" viewBox="0 0 12 12" fill="none">
      <circle cx="6" cy="2.5" r="1" fill="rgba(255,255,255,0.28)"/>
      <circle cx="6" cy="6" r="1" fill="rgba(255,255,255,0.28)"/>
      <circle cx="6" cy="9.5" r="1" fill="rgba(255,255,255,0.28)"/>
    </svg>
  </div>
</aside>

<div class="main-wrap">
  <div class="topbar">
    <span class="page-title">Dashboard</span>
    <div class="topbar-spacer"></div>
  </div>

  <div class="content">
    <section>
      <div class="section-header">
        <span class="section-title">Quick Actions</span>
      </div>
      <div class="qa-grid">
        <a class="qa-tile" href="new-project.html">
          <div class="qa-icon" style="background:var(--gold-lo);">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <path d="M8 2v12M2 8h12" stroke="#D4AA6A" stroke-width="2" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="qa-copy">
            <span class="qa-label">New Project</span>
            <span class="qa-sub">Start a new song workspace</span>
          </div>
        </a>

        <button class="qa-tile" type="button" onclick="showToast('📝 Quick Note','Idea captured to your notes.')">
          <div class="qa-icon" style="background:rgba(122,188,232,0.12);">
            <svg width="16" height="16" viewBox="0 0 16 16" fill="none">
              <rect x="2" y="2" width="12" height="12" rx="2.5" stroke="#7ABCE8" stroke-width="1.5"/>
              <path d="M5 8h6M5 5.5h6M5 10.5h4" stroke="#7ABCE8" stroke-width="1.3" stroke-linecap="round"/>
            </svg>
          </div>
          <div class="qa-copy">
            <span class="qa-label">Quick Note</span>
            <span class="qa-sub">Capture an idea without leaving the flow</span>
          </div>
        </button>
      </div>
    </section>

    <section>
      <div class="section-header">
        <span class="section-title">Recent Projects</span>
        <a href="projects.html" class="see-all">See all projects →</a>
      </div>
      <div class="recent-grid" id="recent-projects"></div>
    </section>

    <section>
      <div class="section-header">
        <span class="section-title">Weekly Progress</span>
        <span class="section-meta" id="todo-hub-meta"></span>
      </div>
      <div class="todo-shell" id="todo-hub"></div>
    </section>

    <section>
      <div class="section-header">
        <span class="section-title">Creative Library</span>
      </div>
      <div class="library-panel" id="creative-library"></div>
    </section>
  </div>
</div>

<div id="toast-container"></div>

<script src="project-store.js"></script>
<script>
  const store = window.FlutianoProjectStore;
  const URGENCY_META = {
    urgent: { className: "is-red", label: "Urgent" },
    soon: { className: "is-yellow", label: "Important" },
    later: { className: "is-green", label: "Later" }
  };

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function openProject(id) {
    window.location.href = store.getDetailUrl(id);
  }

  function showToast(title, sub) {
    const container = document.getElementById("toast-container");
    const toast = document.createElement("div");
    toast.className = "toast";
    const spaceIdx = title.indexOf(" ");
    let icon = "";
    let text = title;
    if (spaceIdx > -1) {
      const first = title.substring(0, spaceIdx);
      const isEmoji = /\p{Emoji}/u.test(first);
      if (isEmoji) {
        icon = first;
        text = title.substring(spaceIdx + 1);
      }
    }
    toast.innerHTML = `${icon ? `<span style="font-size:16px;">${icon}</span>` : ""}<div><div style="font-weight:700;font-size:12.5px;">${text}</div>${sub ? `<div style="font-size:11px;color:rgba(255,255,255,0.5);margin-top:2px;">${sub}</div>` : ""}</div>`;
    container.appendChild(toast);
    setTimeout(() => {
      toast.classList.add("out");
      setTimeout(() => toast.remove(), 220);
    }, 2800);
  }

  function getStageMeta(project) {
    const workflow = store.getSongWorkflowState(project);
    const sourceCount = workflow.sourceLibrary.sheetCount
      + workflow.sourceLibrary.harmonyCount
      + workflow.sourceLibrary.audioCount
      + workflow.sourceLibrary.additionalCount;

    if (project.status === "Released") {
      return {
        label: "Released",
        tone: "violet",
        summary: "Release benchmark is ready for review."
      };
    }
    if (workflow.sourceLibrary.status === "done") {
      return {
        label: "Source Library",
        tone: "gold",
        summary: "Reference set is complete and ready to drive production."
      };
    }
    if (workflow.masterKey.status === "done") {
      return {
        label: "Master Key",
        tone: "jade",
        summary: "Key is locked and the source pass is underway."
      };
    }
    if (workflow.masterKey.status === "in-progress" || sourceCount > 0) {
      return {
        label: "Workflow",
        tone: "gold",
        summary: "Key and reference decisions are still being shaped."
      };
    }
    if (project.music.selectedInstruments.length) {
      return {
        label: "Instruments",
        tone: "sky",
        summary: "The arrangement palette is taking shape."
      };
    }
    return {
      label: "Setup",
      tone: "sky",
      summary: "Core project choices are still being framed."
    };
  }

  function getCheckpointData(project) {
    const workflow = store.getSongWorkflowState(project);
    const sourceCount = workflow.sourceLibrary.sheetCount
      + workflow.sourceLibrary.harmonyCount
      + workflow.sourceLibrary.audioCount
      + workflow.sourceLibrary.additionalCount;
    const activeTodos = project.todos.filter((todo) => !todo.completed).length;
    const totalTodos = project.todos.length;

    return [
      {
        label: "Key",
        value: workflow.masterKey.finalKey || workflow.masterKey.originalKey || "Pending",
        done: workflow.masterKey.status === "done",
        live: workflow.masterKey.status === "in-progress"
      },
      {
        label: "Library",
        value: sourceCount ? `${sourceCount} linked` : "Empty",
        done: workflow.sourceLibrary.status === "done",
        live: workflow.sourceLibrary.status === "in-progress"
      },
      {
        label: "Instruments",
        value: project.music.selectedInstruments.length
          ? `${project.music.selectedInstruments.length} selected`
          : "Pending",
        done: project.music.selectedInstruments.length > 0,
        live: false
      },
      {
        label: "Tasks",
        value: totalTodos ? `${activeTodos} open` : "None yet",
        done: totalTodos > 0 && activeTodos === 0,
        live: activeTodos > 0
      }
    ];
  }

  function renderTaskGroups(groups, completed) {
    if (!groups.length) {
      return `<div class="empty-state">${completed ? "Completed tasks will gather here automatically once a project task is checked off." : "Add a to-do from any Project Detail page and it will appear here instantly under that project."}</div>`;
    }

    return `
      <div class="todo-groups">
        ${groups.map((group) => `
          <section class="todo-group">
            <div class="todo-group-head">
              <button class="todo-group-link" type="button" data-open-project="${group.project.id}">${escapeHtml(group.project.title)}</button>
              <span class="todo-group-meta">${group.todos.length} ${group.todos.length === 1 ? "task" : "tasks"}</span>
            </div>
            <div class="todo-list">
              ${group.todos.map((todo) => {
                const urgency = URGENCY_META[todo.urgency] || URGENCY_META.soon;
                return `
                  <div class="task-row">
                    <button
                      class="task-check ${todo.completed ? "is-complete" : ""}"
                      type="button"
                      data-toggle-todo="${group.project.id}"
                      data-todo-id="${todo.id}"
                      data-completed="${todo.completed ? "true" : "false"}"
                      aria-label="${todo.completed ? "Re-open task" : "Mark task complete"}"
                    ></button>
                    <span class="urgency-dot ${urgency.className}" title="${urgency.label}" aria-hidden="true"></span>
                    <div class="task-text ${todo.completed ? "is-complete" : ""}">${escapeHtml(todo.text)}</div>
                  </div>
                `;
              }).join("")}
            </div>
          </section>
        `).join("")}
      </div>
    `;
  }

  function renderTodoHub() {
    const activeGroups = store.getTodoGroups(false);
    const completedGroups = store.getTodoGroups(true);
    const activeCount = activeGroups.reduce((total, group) => total + group.todos.length, 0);
    const completedCount = completedGroups.reduce((total, group) => total + group.todos.length, 0);

    document.getElementById("todo-hub-meta").textContent = `${activeCount} open · ${completedCount} done`;
    document.getElementById("todo-hub").innerHTML = `
      <section class="todo-panel">
        <div class="todo-panel-head">
          <div>
            <div class="todo-panel-title">To Do</div>
            <div class="todo-panel-sub">Grouped by project, updating directly from each project detail page.</div>
          </div>
          <div class="todo-count-pill">${activeCount}</div>
        </div>
        ${renderTaskGroups(activeGroups, false)}
      </section>

      <section class="todo-panel">
        <div class="todo-panel-head">
          <div>
            <div class="todo-panel-title">Done</div>
            <div class="todo-panel-sub">Completed tasks move here automatically and stay grouped the same way.</div>
          </div>
          <div class="todo-count-pill">${completedCount}</div>
        </div>
        ${renderTaskGroups(completedGroups, true)}
      </section>
    `;
  }

  function renderInstrumentGlyph(instrumentId) {
    const value = String(instrumentId || "").toLowerCase();

    if (value.includes("piano")) {
      return `
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <rect x="2.25" y="3" width="13.5" height="12" rx="1.8"></rect>
          <path d="M5.2 3v6.2M8.2 3v6.2M11.2 3v6.2M14.2 3v6.2"></path>
          <path d="M3.8 10.2h10.4"></path>
        </svg>
      `;
    }

    if (value.includes("drum")) {
      return `
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <ellipse cx="9" cy="6" rx="4.9" ry="2.1"></ellipse>
          <path d="M4.1 6v5.3c0 1.3 2.2 2.4 4.9 2.4s4.9-1.1 4.9-2.4V6"></path>
          <path d="M5.4 3 7.2 5.2M12.6 3 10.8 5.2"></path>
        </svg>
      `;
    }

    if (value.includes("flute") || value.includes("dizi")) {
      return `
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <path d="M3 11.8 15 6.2"></path>
          <circle cx="7.2" cy="9.8" r="0.7" fill="currentColor" stroke="none"></circle>
          <circle cx="9.4" cy="8.8" r="0.7" fill="currentColor" stroke="none"></circle>
          <circle cx="11.6" cy="7.8" r="0.7" fill="currentColor" stroke="none"></circle>
          <path d="M13.9 5.8 15.2 7.1"></path>
        </svg>
      `;
    }

    if (value.includes("voice")) {
      return `
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <rect x="6.4" y="2.6" width="5.2" height="8.2" rx="2.6"></rect>
          <path d="M4.9 8.9a4.1 4.1 0 0 0 8.2 0"></path>
          <path d="M9 13v2.4M6.6 15.4h4.8"></path>
        </svg>
      `;
    }

    if (value.includes("tranh") || value.includes("zither") || value.includes("guzheng")) {
      return `
        <svg viewBox="0 0 18 18" aria-hidden="true">
          <path d="M3.2 11.8 14.8 6.2"></path>
          <path d="M4.6 12.5 6 8.4M7.1 11.3 8.5 7.2M9.7 10.1 11.1 6.2"></path>
        </svg>
      `;
    }

    return `
      <svg viewBox="0 0 18 18" aria-hidden="true">
        <circle cx="9" cy="9" r="5.4"></circle>
      </svg>
    `;
  }

  function renderInstrumentBadge(instrumentId) {
    const item = store.INSTRUMENT_LIBRARY.find((entry) => entry.id === instrumentId);
    const label = item?.label || instrumentId;
    return `
      <span class="recent-instrument">
        <span class="recent-instrument-icon">${renderInstrumentGlyph(instrumentId)}</span>
        <span>${escapeHtml(label)}</span>
      </span>
    `;
  }

  function renderRecentProjects(projects) {
    document.getElementById("recent-projects").innerHTML = projects.slice(0, 5).map((project) => {
      const thumbnail = store.getThumbnail(project);
      const stage = getStageMeta(project);
      const selectedInstruments = (project.music.selectedInstruments || []).slice(0, 3);
      const openTodos = project.todos.filter((todo) => !todo.completed).length;
      const summary = project.shortDescription || stage.summary;
      return `
        <article class="recent-card" data-open-project="${project.id}" tabindex="0">
          <div class="recent-media">
            <img src="${thumbnail}" alt="${project.title}">
            <div class="stage-badge tone-${stage.tone}">${escapeHtml(stage.label)}</div>
          </div>
          <div class="recent-body">
            <div class="recent-kicker">${escapeHtml(project.category || "Project")}</div>
            <h3 class="recent-card-title">${escapeHtml(project.title)}</h3>
            <p class="recent-card-copy">${escapeHtml(summary)}</p>

            <div class="recent-instruments">
              ${selectedInstruments.length
                ? selectedInstruments.map((instrumentId) => renderInstrumentBadge(instrumentId)).join("")
                : `<span class="recent-instrument"><span class="recent-instrument-icon">${renderInstrumentGlyph("")}</span><span>Palette Pending</span></span>`
              }
            </div>

            <div class="recent-card-footer">
              <span class="recent-card-footnote">${openTodos} ${openTodos === 1 ? "open task" : "open tasks"} · ${escapeHtml(project.status)}</span>
              <span class="recent-card-link">Open Project</span>
            </div>
          </div>
        </article>
      `;
    }).join("");
  }

  function renderCreativeLibrary(projects) {
    const libraryCounts = projects.reduce((accumulator, project) => {
      const workflow = store.getSongWorkflowState(project);
      accumulator.sheet += workflow.sourceLibrary.sheetCount;
      accumulator.harmony += workflow.sourceLibrary.harmonyCount;
      accumulator.audio += workflow.sourceLibrary.audioCount;
      accumulator.additional += workflow.sourceLibrary.additionalCount;
      return accumulator;
    }, { sheet: 0, harmony: 0, audio: 0, additional: 0 });

    const total = libraryCounts.sheet + libraryCounts.harmony + libraryCounts.audio + libraryCounts.additional;

    document.getElementById("creative-library").innerHTML = `
      <div class="library-shell">
        <div class="library-lead">
          <div>
            <div class="section-title" style="font-size:30px;line-height:1.04;">Creative Library</div>
            <div class="library-copy">A stronger source overview for the whole system, so sheet material, harmony references, listening references, and extra support links are visible at a glance.</div>
          </div>
          <div class="library-total">
            <strong>${total}</strong>
            <span>Total linked sources</span>
          </div>
        </div>

        <div class="library-grid">
          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">𝄞</span>
              <span class="library-count">${libraryCounts.sheet}</span>
            </div>
            <div>
              <strong>Sheet Sources</strong>
              <p>Reference scores and notation pulled into active projects.</p>
            </div>
          </article>

          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">♬</span>
              <span class="library-count">${libraryCounts.harmony}</span>
            </div>
            <div>
              <strong>Harmony Sources</strong>
              <p>Chord and harmonic references guiding arrangement decisions.</p>
            </div>
          </article>

          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">▶</span>
              <span class="library-count">${libraryCounts.audio}</span>
            </div>
            <div>
              <strong>Audio References</strong>
              <p>Listening examples collected for performance, feel, and production tone.</p>
            </div>
          </article>

          <article class="library-tile">
            <div class="library-tile-head">
              <span class="library-icon">✧</span>
              <span class="library-count">${libraryCounts.additional}</span>
            </div>
            <div>
              <strong>Additional Sources</strong>
              <p>Extra links that support concept shaping and creative development.</p>
            </div>
          </article>
        </div>
      </div>
    `;
  }

  function renderDashboard() {
    const projects = store.getProjects();
    renderRecentProjects(projects);
    renderTodoHub();
    renderCreativeLibrary(projects);
  }

  document.addEventListener("click", (event) => {
    const projectTrigger = event.target.closest("[data-open-project]");
    if (projectTrigger) {
      openProject(projectTrigger.getAttribute("data-open-project"));
      return;
    }

    const toggleTrigger = event.target.closest("[data-toggle-todo]");
    if (toggleTrigger) {
      const projectId = toggleTrigger.getAttribute("data-toggle-todo");
      const todoId = toggleTrigger.getAttribute("data-todo-id");
      const isCompleted = toggleTrigger.getAttribute("data-completed") === "true";
      store.toggleProjectTodo(projectId, todoId, !isCompleted);
      renderDashboard();
    }
  });

  document.addEventListener("keydown", (event) => {
    const card = event.target.closest(".recent-card[data-open-project]");
    if (!card) return;
    if (event.key === "Enter" || event.key === " ") {
      event.preventDefault();
      openProject(card.getAttribute("data-open-project"));
    }
  });

  window.addEventListener(store.TODO_UPDATE_EVENT, renderDashboard);
  window.addEventListener("storage", (event) => {
    if (!event.key || event.key === store.STORAGE_KEY) {
      renderDashboard();
    }
  });

  renderDashboard();
</script>
</body>
</html>
