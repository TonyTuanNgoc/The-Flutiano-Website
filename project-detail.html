<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Flutiano — Project Detail</title>
<link rel="stylesheet" href="shared.css">
<style>
  .content {
    flex: 1;
    overflow-y: auto;
    padding: 32px 36px 48px;
    display: flex;
    flex-direction: column;
    gap: 20px;
  }

  .hero-card,
  .section-card,
  .workflow-card,
  .info-card,
  .task-panel {
    background: linear-gradient(180deg, rgba(17,22,29,0.48) 0%, rgba(10,14,20,0.30) 100%);
    border: 1px solid rgba(255,255,255,0.14);
    border-radius: var(--r);
    backdrop-filter: blur(20px) saturate(160%);
    -webkit-backdrop-filter: blur(20px) saturate(160%);
    box-shadow:
      0 18px 44px rgba(4,7,12,0.18),
      inset 0 1px 0 rgba(255,255,255,0.04);
  }

  .project-shell {
    display: grid;
    grid-template-columns: minmax(0, 1fr) 320px;
    gap: 18px;
    align-items: start;
  }

  .project-main,
  .project-side {
    display: flex;
    flex-direction: column;
    gap: 18px;
  }

  .project-side {
    position: sticky;
    top: 24px;
  }

  .hero-card {
    display: grid;
    grid-template-columns: 420px minmax(0, 1fr);
    overflow: hidden;
  }

  .hero-media {
    min-height: 340px;
    background: rgba(255,255,255,0.04);
  }

  .hero-media img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .hero-body {
    padding: 28px 30px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .hero-top {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 16px;
  }

  .hero-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 42px;
    line-height: 0.98;
    letter-spacing: -0.055em;
    color: #FFFFFF;
    font-weight: 600;
    max-width: 620px;
  }

  .hero-actions {
    display: flex;
    align-items: center;
    gap: 10px;
    flex-wrap: wrap;
    justify-content: flex-end;
  }

  .back-btn,
  .edit-btn,
  .mini-btn {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    border-radius: 999px;
    font-weight: 800;
    transition: transform 0.15s, border-color 0.15s, background 0.15s, color 0.15s, opacity 0.15s;
  }

  .back-btn,
  .edit-btn {
    padding: 10px 15px;
    border: 1px solid rgba(255,255,255,0.12);
    font-size: 12px;
  }

  .back-btn {
    background: rgba(255,255,255,0.05);
    color: var(--t2);
  }

  .edit-btn {
    background: rgba(212,170,106,0.16);
    border-color: rgba(212,170,106,0.26);
    color: var(--gold-hi);
  }

  .back-btn:hover,
  .edit-btn:hover,
  .mini-btn:hover {
    transform: translateY(-1px);
  }

  .status-badge {
    display: inline-flex;
    align-items: center;
    gap: 7px;
    width: fit-content;
    padding: 7px 12px;
    border-radius: 999px;
    font-size: 10px;
    letter-spacing: 0.08em;
    text-transform: uppercase;
    font-weight: 800;
  }

  .status-badge::before {
    content: "";
    width: 7px;
    height: 7px;
    border-radius: 50%;
    background: currentColor;
  }

  .tone-gold .status-badge {
    background: rgba(212,170,106,0.16);
    border: 1px solid rgba(212,170,106,0.22);
    color: var(--gold-hi);
  }

  .tone-jade .status-badge {
    background: rgba(94,201,177,0.14);
    border: 1px solid rgba(94,201,177,0.22);
    color: #8DE8D1;
  }

  .tone-sky .status-badge {
    background: rgba(128,191,231,0.14);
    border: 1px solid rgba(128,191,231,0.22);
    color: #A7D9F7;
  }

  .tone-violet .status-badge {
    background: rgba(167,139,250,0.14);
    border: 1px solid rgba(167,139,250,0.22);
    color: #D0C1FF;
  }

  .hero-meta-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .meta-card,
  .info-stat,
  .sheet-count,
  .theory-card,
  .workflow-mini,
  .source-group,
  .task-column,
  .toggle-pill,
  .image-thumb {
    padding: 14px 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
  }

  .meta-card span,
  .section-label,
  .info-stat span,
  .sheet-count span,
  .theory-card span,
  .workflow-label,
  .source-group-title,
  .task-column-title {
    display: block;
    margin-bottom: 6px;
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
  }

  .meta-card strong,
  .info-stat strong,
  .sheet-count strong,
  .theory-card strong {
    display: block;
    font-size: 14px;
    line-height: 1.5;
    color: #FFFFFF;
    font-weight: 700;
  }

  .section-card {
    padding: 22px 24px;
    display: flex;
    flex-direction: column;
    gap: 16px;
  }

  .section-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 24px;
    line-height: 1.08;
    letter-spacing: -0.04em;
    color: #FFFFFF;
    font-weight: 600;
  }

  .section-copy {
    font-size: 13px;
    line-height: 1.7;
    color: var(--t2);
  }

  .workflow-header {
    display: flex;
    align-items: flex-start;
    justify-content: space-between;
    gap: 12px;
    flex-wrap: wrap;
  }

  .mini-btn {
    width: 34px;
    height: 34px;
    border: 1px solid rgba(255,255,255,0.12);
    background: rgba(255,255,255,0.04);
    color: var(--t2);
  }

  .mini-btn.is-accent {
    border-color: rgba(212,170,106,0.26);
    background: rgba(212,170,106,0.12);
    color: var(--gold-hi);
  }

  .five-step-strip {
    display: grid;
    grid-template-columns: repeat(5, minmax(0, 1fr));
    gap: 10px;
  }

  .step-icon-block {
    min-height: 76px;
    padding: 14px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .step-icon-block.is-active {
    border-color: rgba(212,170,106,0.24);
    background: rgba(212,170,106,0.10);
  }

  .step-icon-block .logo-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .step-icon-block img {
    width: 22px;
    height: 22px;
    object-fit: contain;
  }

  .step-icon-block svg {
    width: 22px;
    height: 22px;
    color: rgba(255,255,255,0.9);
  }

  .workflow-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 16px;
  }

  .workflow-card {
    padding: 20px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .workflow-card .workflow-title {
    font-family: "Sora", "Manrope", sans-serif;
    font-size: 22px;
    line-height: 1.08;
    color: #FFFFFF;
    font-weight: 600;
    letter-spacing: -0.04em;
  }

  .key-grid {
    display: grid;
    grid-template-columns: minmax(0, 1.15fr) 130px minmax(0, 1fr);
    gap: 12px;
    align-items: stretch;
  }

  .locked-key-card {
    padding: 18px;
    border-radius: 20px;
    border: 1px solid rgba(212,170,106,0.22);
    background:
      radial-gradient(circle at top right, rgba(212,170,106,0.16), transparent 38%),
      rgba(255,255,255,0.04);
  }

  .locked-key-card span {
    display: block;
    margin-bottom: 6px;
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
  }

  .locked-key-card strong {
    display: block;
    font-size: 32px;
    line-height: 1;
    color: var(--gold-hi);
    font-weight: 800;
    letter-spacing: -0.05em;
    margin-bottom: 8px;
  }

  .locked-key-card small {
    display: block;
    font-size: 13px;
    line-height: 1.65;
    color: var(--t2);
    font-weight: 700;
  }

  .shift-card {
    padding: 16px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    display: flex;
    flex-direction: column;
    justify-content: center;
    align-items: center;
    text-align: center;
    gap: 8px;
  }

  .shift-card span {
    font-size: 9px;
    line-height: 1;
    letter-spacing: 0.16em;
    text-transform: uppercase;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
  }

  .shift-value {
    font-size: 34px;
    line-height: 1;
    color: var(--sky);
    font-weight: 800;
    letter-spacing: -0.04em;
  }

  .shift-copy {
    font-size: 12px;
    line-height: 1.5;
    color: var(--t2);
    font-weight: 700;
  }

  .theory-grid {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .chip-list,
  .link-chip-list,
  .instrument-list,
  .image-grid {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
  }

  .chip,
  .link-chip,
  .toggle-pill {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    padding: 8px 10px;
    border-radius: 999px;
    font-size: 11px;
    font-weight: 800;
    color: #FFFFFF;
  }

  .chip,
  .link-chip {
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.05);
  }

  .toggle-pill.is-on {
    border-color: rgba(212,170,106,0.22);
    background: rgba(212,170,106,0.12);
    color: var(--gold-hi);
  }

  .source-grid,
  .info-grid {
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 14px;
  }

  .source-group {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .source-group-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .source-group-title {
    margin-bottom: 0;
    display: flex;
    align-items: center;
    gap: 10px;
    font-size: 13px;
    color: #FFFFFF;
  }

  .source-group-title img {
    width: 20px;
    height: 20px;
    object-fit: contain;
  }

  .source-group-actions {
    display: flex;
    gap: 8px;
  }

  .source-link-list {
    display: flex;
    flex-direction: column;
    gap: 8px;
  }

  .source-link {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 10px;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    color: #FFFFFF;
    font-size: 12px;
    font-weight: 700;
  }

  .source-link span {
    min-width: 0;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }

  .image-thumb {
    width: 98px;
    height: 98px;
    overflow: hidden;
    padding: 0;
  }

  .image-thumb img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  .instrument-item {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 10px 12px;
    border-radius: 16px;
    border: 1px solid rgba(255,255,255,0.08);
    background: rgba(255,255,255,0.04);
    font-size: 12px;
    font-weight: 700;
    color: #FFFFFF;
  }

  .instrument-item img {
    width: 18px;
    height: 18px;
    object-fit: contain;
    filter: brightness(0) saturate(100%) invert(81%) sepia(20%) saturate(741%) hue-rotate(351deg) brightness(95%) contrast(87%);
  }

  .task-panel {
    padding: 18px;
    display: flex;
    flex-direction: column;
    gap: 14px;
  }

  .todo-form {
    display: grid;
    grid-template-columns: minmax(0, 1fr);
    gap: 10px;
  }

  .todo-input {
    width: 100%;
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 18px;
    padding: 14px 16px;
    background: rgba(255,255,255,0.04);
    color: #FFFFFF;
    font: inherit;
    font-size: 13px;
    font-weight: 700;
    outline: none;
  }

  .todo-input:focus {
    border-color: rgba(212,170,106,0.32);
    box-shadow: 0 0 0 4px rgba(212,170,106,0.08);
  }

  .todo-input::placeholder {
    color: rgba(255,255,255,0.34);
  }

  .urgency-picker {
    display: inline-flex;
    align-items: center;
    gap: 8px;
    padding: 8px 10px;
    border-radius: 18px;
    border: 1px solid rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.04);
    width: fit-content;
  }

  .urgency-button {
    width: 26px;
    height: 26px;
    border-radius: 50%;
    border: 1px solid rgba(255,255,255,0.16);
    background: transparent;
    position: relative;
    cursor: pointer;
    transition: transform 0.14s, border-color 0.14s, box-shadow 0.14s;
  }

  .urgency-button::after {
    content: "";
    position: absolute;
    inset: 5px;
    border-radius: 50%;
    background: currentColor;
    opacity: 0.9;
  }

  .urgency-button.urgency-red { color: #D87474; }
  .urgency-button.urgency-yellow { color: #D4AA6A; }
  .urgency-button.urgency-green { color: #67C5A6; }

  .urgency-button.is-selected {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.30);
    box-shadow: 0 0 0 4px rgba(255,255,255,0.04);
  }

  .todo-submit {
    display: inline-flex;
    align-items: center;
    justify-content: center;
    min-height: 44px;
    border-radius: 18px;
    border: 1px solid rgba(212,170,106,0.26);
    background: rgba(212,170,106,0.14);
    color: var(--gold-hi);
    font-size: 12px;
    font-weight: 800;
    cursor: pointer;
    transition: transform 0.14s, background 0.14s, border-color 0.14s;
  }

  .todo-submit:hover {
    transform: translateY(-1px);
    background: rgba(212,170,106,0.20);
    border-color: rgba(212,170,106,0.34);
  }

  .task-columns {
    display: grid;
    grid-template-columns: 1fr;
    gap: 12px;
  }

  .task-column {
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  .task-column-head {
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 12px;
  }

  .task-column-count {
    font-size: 10px;
    color: rgba(255,255,255,0.42);
    font-weight: 800;
    letter-spacing: 0.12em;
    text-transform: uppercase;
  }

  .todo-list {
    display: flex;
    flex-direction: column;
    gap: 10px;
  }

  .task-row {
    display: grid;
    grid-template-columns: 18px 10px minmax(0, 1fr);
    gap: 12px;
    align-items: center;
  }

  .task-check {
    width: 18px;
    height: 18px;
    border-radius: 50%;
    border: 1.5px solid rgba(255,255,255,0.18);
    background: transparent;
    cursor: pointer;
    position: relative;
    transition: background 0.13s, border-color 0.13s, transform 0.13s;
  }

  .task-check:hover {
    transform: scale(1.05);
    border-color: rgba(255,255,255,0.28);
  }

  .task-check.is-complete {
    background: rgba(94,201,177,0.20);
    border-color: rgba(94,201,177,0.34);
  }

  .task-check.is-complete::after {
    content: "";
    position: absolute;
    inset: 4px;
    border-radius: 50%;
    background: #8DE8D1;
  }

  .urgency-dot {
    width: 10px;
    height: 10px;
    border-radius: 50%;
    box-shadow: 0 0 0 4px rgba(255,255,255,0.02);
  }

  .urgency-dot.is-red { background: #D87474; }
  .urgency-dot.is-yellow { background: #D4AA6A; }
  .urgency-dot.is-green { background: #67C5A6; }

  .task-text {
    font-size: 13px;
    line-height: 1.52;
    color: rgba(255,255,255,0.92);
    font-weight: 700;
  }

  .task-text.is-complete {
    color: rgba(255,255,255,0.46);
  }

  .empty-state {
    min-height: 96px;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 16px;
    border-radius: 18px;
    border: 1px dashed rgba(255,255,255,0.10);
    background: rgba(255,255,255,0.03);
    font-size: 13px;
    line-height: 1.68;
    color: rgba(255,255,255,0.46);
    text-align: center;
    font-weight: 600;
  }

  @media (max-width: 1260px) {
    .project-shell,
    .hero-card,
    .workflow-grid,
    .theory-grid,
    .source-grid,
    .info-grid,
    .hero-meta-grid {
      grid-template-columns: 1fr;
    }

    .project-side {
      position: static;
    }
  }

  @media (max-width: 820px) {
    .content {
      padding: 24px 18px 36px;
    }

    .hero-body,
    .section-card,
    .workflow-card,
    .task-panel {
      padding: 20px;
    }

    .hero-title {
      font-size: 32px;
    }

    .hero-top,
    .key-grid,
    .five-step-strip {
      grid-template-columns: 1fr;
      flex-direction: column;
      align-items: flex-start;
    }
  }
</style>
</head>

<script>
  const store = window.FlutianoProjectStore;
  const URGENCY_META = {
    urgent: { className: "is-red", label: "Urgent" },
    soon: { className: "is-yellow", label: "Important" },
    later: { className: "is-green", label: "Later" }
  };
  const STEP_ICON_HTML = {
    key: `
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M9 13a4 4 0 1 1 2.9 3.84L8 20v-3H5v-3H2v-3.1L8.1 4.8A4 4 0 0 1 9 13Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
    `,
    instruments: `
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M7 18V7l10-3v11" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        <circle cx="5" cy="18" r="2.5" stroke="currentColor" stroke-width="1.6"/>
        <circle cx="17" cy="15" r="2.5" stroke="currentColor" stroke-width="1.6"/>
      </svg>
    `,
    perform: `
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M5 19V5l14 7-14 7Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
    `,
    polish: `
      <svg viewBox="0 0 24 24" fill="none">
        <path d="M12 3l2.2 4.8L19 10l-4.8 2.2L12 17l-2.2-4.8L5 10l4.8-2.2L12 3Z" stroke="currentColor" stroke-width="1.6" stroke-linejoin="round"/>
      </svg>
    `
  };
  let currentUrgency = "soon";
  let pendingTaskText = "";

  function escapeHtml(value) {
    return String(value || "")
      .replace(/&/g, "&amp;")
      .replace(/</g, "&lt;")
      .replace(/>/g, "&gt;")
      .replace(/"/g, "&quot;")
      .replace(/'/g, "&#39;");
  }

  function getCurrentProject() {
    const params = new URLSearchParams(window.location.search);
    const id = params.get("project");
    return store.getProject(id) || (!id ? store.getDefaultProject() : null);
  }

  function renderUrgencyButtons() {
    return `
      <div class="urgency-picker" aria-label="Task urgency">
        <button type="button" class="urgency-button urgency-red ${currentUrgency === "urgent" ? "is-selected" : ""}" data-urgency="urgent" title="Urgent"></button>
        <button type="button" class="urgency-button urgency-yellow ${currentUrgency === "soon" ? "is-selected" : ""}" data-urgency="soon" title="Important"></button>
        <button type="button" class="urgency-button urgency-green ${currentUrgency === "later" ? "is-selected" : ""}" data-urgency="later" title="Later"></button>
      </div>
    `;
  }

  function renderTaskList(project, completed) {
    const tasks = project.todos.filter((todo) => Boolean(todo.completed) === Boolean(completed));
    if (!tasks.length) {
      return `<div class="empty-state">${completed ? "Completed tasks from this project will collect here." : "Add the next practical action above and it will show up here immediately."}</div>`;
    }

    return `
      <div class="todo-list">
        ${tasks.map((todo) => {
          const urgency = URGENCY_META[todo.urgency] || URGENCY_META.soon;
          return `
            <div class="task-row">
              <button
                class="task-check ${todo.completed ? "is-complete" : ""}"
                type="button"
                data-toggle-todo="${project.id}"
                data-todo-id="${todo.id}"
                data-completed="${todo.completed ? "true" : "false"}"
                aria-label="${todo.completed ? "Re-open task" : "Mark task complete"}"
              ></button>
              <span class="urgency-dot ${urgency.className}" title="${urgency.label}" aria-hidden="true"></span>
              <div class="task-text ${todo.completed ? "is-complete" : ""}">${escapeHtml(todo.text)}</div>
            </div>
          `;
        }).join("")}
      </div>
    `;
  }

  function renderTaskPanel(project) {
    return `
      <aside class="task-panel">
        <div>
          <div class="section-label">Add To Do List</div>
          <div class="section-title" style="font-size:20px;">Task Control</div>
          <div class="section-copy">Visible here by default, so you can add the next action without opening Edit.</div>
        </div>
        <form class="todo-form" id="project-todo-form">
          <input class="todo-input" id="project-todo-input" type="text" name="task" value="${escapeHtml(pendingTaskText)}" placeholder="Add the next important action">
          ${renderUrgencyButtons()}
          <button class="todo-submit" type="submit">Add Task</button>
        </form>
        <div class="task-columns">
          <section class="task-column">
            <div class="task-column-head">
              <div class="task-column-title">To Do</div>
              <div class="task-column-count">${project.todos.filter((todo) => !todo.completed).length}</div>
            </div>
            ${renderTaskList(project, false)}
          </section>
          <section class="task-column">
            <div class="task-column-head">
              <div class="task-column-title">Done</div>
              <div class="task-column-count">${project.todos.filter((todo) => todo.completed).length}</div>
            </div>
            ${renderTaskList(project, true)}
          </section>
        </div>
      </aside>
    `;
  }

  function renderWorkflow(project) {
    const workflow = store.getSongWorkflowState(project);
    const theory = store.getKeyTheory(workflow.masterKey.finalKey);
    const linkedSources = store.getSourceLibraryEntries(project);
    const sourceCount = linkedSources.sheet.length + linkedSources.harmony.length + linkedSources.audio.length + linkedSources.additional.length;

    return `
      <section class="section-card">
        <div class="workflow-header">
          <div>
            <div class="section-label">Workflow Hub</div>
            <div class="section-title">Connected Production Flow</div>
            <div class="section-copy">Key locking, source collection, arrangement, performance, and finishing stay visible as one real workflow instead of disconnected sections.</div>
          </div>
          <a class="edit-btn" href="${store.getEditUrl(project.id, "workflow-step-1")}">Edit Workflow</a>
        </div>

        <div class="five-step-strip">
          <div class="step-icon-block is-active">
            <div class="logo-row">
              <img src="assets/icons/musescore.png" alt="MuseScore">
              <img src="assets/icons/youtube.png" alt="YouTube">
              <img src="assets/icons/internet.png" alt="Internet">
            </div>
          </div>
          <div class="step-icon-block is-active">${STEP_ICON_HTML.key}</div>
          <div class="step-icon-block is-active">${STEP_ICON_HTML.instruments}</div>
          <div class="step-icon-block">${STEP_ICON_HTML.perform}</div>
          <div class="step-icon-block">${STEP_ICON_HTML.polish}</div>
        </div>

        <div class="workflow-grid">
          <article class="workflow-card">
            <div class="workflow-label">Step 1 · Lock Master Key</div>
            <div class="key-grid">
              <div class="locked-key-card">
                <span>Locked Key</span>
                <strong>${escapeHtml(workflow.masterKey.finalKey || "Not set")}</strong>
                <small>${escapeHtml(workflow.masterKey.finalKey ? "Chord family and harmony now follow this key." : "Set the locked key to build the harmony library.")}</small>
              </div>
              <div class="shift-card">
                <span>Shift</span>
                <div class="shift-value">${escapeHtml(store.getKeyShiftLabel(workflow.masterKey.originalKey, workflow.masterKey.finalKey))}</div>
                <div class="shift-copy">${escapeHtml(store.getKeyShiftDescription(workflow.masterKey.originalKey, workflow.masterKey.finalKey))}</div>
              </div>
              <div class="info-stat">
                <span>Original Key</span>
                <strong>${escapeHtml(workflow.masterKey.originalKey || "Not set")}</strong>
              </div>
            </div>
            <div class="theory-grid">
              <div class="theory-card">
                <span>Priority Keys</span>
                ${(workflow.masterKey.priorityKeys || []).length
                  ? `<div class="chip-list">${workflow.masterKey.priorityKeys.map((key) => `<span class="chip">${escapeHtml(key)}</span>`).join("")}</div>`
                  : `<div class="empty-state">No priority keys yet.</div>`}
              </div>
              <div class="theory-card">
                <span>Primary Chords</span>
                ${theory
                  ? `<div class="chip-list">${theory.primaryChords.map((chord) => `<span class="chip">${escapeHtml(chord)}</span>`).join("")}</div>`
                  : `<div class="empty-state">Primary harmony will appear once the locked key is set.</div>`}
              </div>
              <div class="theory-card">
                <span>Chord Library</span>
                ${theory
                  ? `<div class="chip-list">${theory.diatonicChords.map((chord) => `<span class="chip">${escapeHtml(chord)}</span>`).join("")}</div>`
                  : `<div class="empty-state">Full chord family will appear here.</div>`}
              </div>
            </div>
          </article>

          <article class="workflow-card">
            <div class="workflow-label">Step 2 · Collect Sheet Sources</div>
            <div class="info-grid">
              <div class="sheet-count">
                <span>Sheet Sources</span>
                <strong>${linkedSources.sheet.length}</strong>
              </div>
              <div class="sheet-count">
                <span>Harmony Sources</span>
                <strong>${linkedSources.harmony.length}</strong>
              </div>
              <div class="sheet-count">
                <span>Audio References</span>
                <strong>${linkedSources.audio.length}</strong>
              </div>
              <div class="sheet-count">
                <span>Additional Sources</span>
                <strong>${linkedSources.additional.length}</strong>
              </div>
            </div>
            <div class="section-copy">${sourceCount ? `${sourceCount} linked items are now attached to this project and can be managed from Edit.` : "No sources linked yet. Add MuseScore, YouTube, or web resources from the Edit view."}</div>
            <div class="source-group">
              <div class="source-group-head">
                <div class="source-group-title">
                  <img src="assets/icons/musescore.png" alt="MuseScore">
                  <span>MuseScore + Sheet Library</span>
                </div>
                <div class="source-group-actions">
                  <a class="mini-btn" href="https://musescore.com/" target="_blank" rel="noreferrer" title="Open MuseScore">
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M5 3h6v6M9 5l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </a>
                  <a class="mini-btn is-accent" href="${store.getEditUrl(project.id, "workflow-step-2")}" title="Edit source library">+</a>
                </div>
              </div>
              ${linkedSources.sheet.length
                ? `<div class="link-chip-list">${linkedSources.sheet.slice(0, 6).map((entry) => `<span class="link-chip">${escapeHtml(entry.label || "Sheet source")}</span>`).join("")}</div>`
                : `<div class="empty-state">No sheet sources linked yet.</div>`}
            </div>
          </article>
        </div>
      </section>
    `;
  }

  function renderProjectInfo(project) {
    const linkedSources = store.getSourceLibraryEntries(project);
    const audio = project.production.audio;
    const image = project.production.image;
    const selectedInstruments = project.music.selectedInstruments || [];
    const sheetImageEntries = linkedSources.sheet.filter((entry) => Array.isArray(entry.images) && entry.images.length);

    return `
      <section class="section-card">
        <div class="workflow-header">
          <div>
            <div class="section-label">Project Info</div>
            <div class="section-title">Linked Working Surfaces</div>
            <div class="section-copy">Instruments, sheet assets, audio workflow notes, and image planning all stay attached to this project instead of living in isolated screens.</div>
          </div>
          <a class="edit-btn" href="${store.getEditUrl(project.id)}">Open Editor</a>
        </div>

        <div class="source-grid">
          <article class="info-card">
            <div class="source-group-title" style="margin-bottom:12px;">Instruments</div>
            ${selectedInstruments.length
              ? `<div class="instrument-list">
                  ${selectedInstruments.map((id) => {
                    const item = store.INSTRUMENT_LIBRARY.find((entry) => entry.id === id) || { label: id, img: "assets/instruments/piano.png" };
                    return `<span class="instrument-item"><img src="${escapeHtml(item.img)}" alt="${escapeHtml(item.label)}">${escapeHtml(item.label)}</span>`;
                  }).join("")}
                </div>`
              : `<div class="empty-state">No instruments selected yet.</div>`}
          </article>

          <article class="info-card">
            <div class="source-group-title" style="margin-bottom:12px;">Audio Production</div>
            <div class="chip-list" style="margin-bottom:10px;">
              ${(audio.scoreOrder || []).map((item) => `<span class="chip">${escapeHtml(item)}</span>`).join("")}
            </div>
            <div class="link-chip-list">
              <span class="toggle-pill ${audio.supportsMidiInput ? "is-on" : ""}">Manual Note Input (MIDI)</span>
              <span class="toggle-pill ${audio.supportsXmlImport ? "is-on" : ""}">XML Import</span>
            </div>
            ${audio.workflowNotes ? `<div class="section-copy" style="margin-top:12px;">${escapeHtml(audio.workflowNotes)}</div>` : ""}
            ${audio.iterationLoop ? `<div class="section-copy">${escapeHtml(audio.iterationLoop)}</div>` : ""}
          </article>

          <article class="info-card">
            <div class="source-group-title" style="margin-bottom:12px;">Sheet Library</div>
            ${sheetImageEntries.length
              ? `<div class="image-grid">
                  ${sheetImageEntries.flatMap((entry) => entry.images.slice(0, 2).map((imageSrc) => `<div class="image-thumb"><img src="${imageSrc}" alt="${escapeHtml(entry.label || "Sheet image")}"></div>`)).slice(0, 6).join("")}
                </div>`
              : `<div class="empty-state">Saved sheet images will appear back here after you add them in Edit.</div>`}
          </article>

          <article class="info-card">
            <div class="source-group-title" style="margin-bottom:12px;">Image Production</div>
            ${project.visual.concept ? `<div class="section-copy">${escapeHtml(project.visual.concept)}</div>` : ""}
            ${image.workflowNotes ? `<div class="section-copy">${escapeHtml(image.workflowNotes)}</div>` : ""}
            ${image.deliveryNotes ? `<div class="section-copy">${escapeHtml(image.deliveryNotes)}</div>` : ""}
          </article>
        </div>

        <div class="source-grid">
          <section class="source-group">
            <div class="source-group-head">
              <div class="source-group-title">
                <img src="assets/icons/musescore.png" alt="MuseScore">
                <span>MuseScore</span>
              </div>
              <div class="source-group-actions">
                <a class="mini-btn" href="https://musescore.com/" target="_blank" rel="noreferrer" title="Open MuseScore">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M5 3h6v6M9 5l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </a>
              </div>
            </div>
            ${linkedSources.sheet.length
              ? `<div class="source-link-list">${linkedSources.sheet.slice(0, 4).map((entry) => `
                  <a class="source-link" href="${escapeHtml(entry.url || store.getEditUrl(project.id, "workflow-step-2"))}" ${entry.url ? `target="_blank" rel="noreferrer"` : ``}>
                    <span>${escapeHtml(entry.label || "Sheet source")}</span>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M5 3h6v6M9 5l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </a>
                `).join("")}</div>`
              : `<div class="empty-state">No MuseScore or sheet sources linked yet.</div>`}
          </section>

          <section class="source-group">
            <div class="source-group-head">
              <div class="source-group-title">
                <img src="assets/icons/youtube.png" alt="YouTube">
                <span>YouTube</span>
              </div>
              <div class="source-group-actions">
                <a class="mini-btn" href="https://www.youtube.com/" target="_blank" rel="noreferrer" title="Open YouTube">
                  <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                    <path d="M5 3h6v6M9 5l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                  </svg>
                </a>
              </div>
            </div>
            ${linkedSources.audio.length
              ? `<div class="source-link-list">${linkedSources.audio.slice(0, 4).map((entry) => `
                  <a class="source-link" href="${escapeHtml(entry.url)}" target="_blank" rel="noreferrer">
                    <span>${escapeHtml(entry.label || "YouTube reference")}</span>
                    <svg width="14" height="14" viewBox="0 0 14 14" fill="none">
                      <path d="M5 3h6v6M9 5l-5 5" stroke="currentColor" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
                    </svg>
                  </a>
                `).join("")}</div>`
              : `<div class="empty-state">No YouTube references linked yet.</div>`}
          </section>
        </div>
      </section>
    `;
  }

  function renderProject(project) {
    const tone = store.getTone(project);
    const activeTodos = project.todos.filter((todo) => !todo.completed).length;

    return `
      <div class="tone-${tone}">
        <div class="project-shell">
          <div class="project-main">
            <section class="hero-card">
              <div class="hero-media">
                <img src="${store.getThumbnail(project)}" alt="${escapeHtml(project.title)}">
              </div>
              <div class="hero-body">
                <div class="hero-top">
                  <div>
                    <div class="status-badge">${escapeHtml(project.status)}</div>
                    <h1 class="hero-title" style="margin-top:14px;">${escapeHtml(project.title)}</h1>
                  </div>
                  <div class="hero-actions">
                    <a class="back-btn" href="projects.html">Projects</a>
                    <a class="edit-btn" href="${store.getEditUrl(project.id)}">Edit</a>
                  </div>
                </div>
                <div class="hero-meta-grid">
                  <div class="meta-card">
                    <span>Deadline</span>
                    <strong>${escapeHtml(store.formatDate(project.deadline))}</strong>
                  </div>
                  <div class="meta-card">
                    <span>Open Tasks</span>
                    <strong>${activeTodos}</strong>
                  </div>
                  <div class="meta-card">
                    <span>Project Type</span>
                    <strong>${escapeHtml(project.category || "Project")}</strong>
                  </div>
                </div>
              </div>
            </section>

            ${renderWorkflow(project)}
            ${renderProjectInfo(project)}
          </div>

          <div class="project-side">
            ${renderTaskPanel(project)}
          </div>
        </div>
      </div>
    `;
  }

  function renderNotFound() {
    return `
      <section class="section-card">
        <div class="section-title">Project not found</div>
        <div class="section-copy">Return to Projects and open a valid item, or create a new one first.</div>
      </section>
    `;
  }

  function renderPage() {
    const project = getCurrentProject();
    const root = document.getElementById("project-root");

    if (!project) {
      root.innerHTML = renderNotFound();
      return;
    }

    document.title = `The Flutiano — ${project.title}`;
    document.getElementById("page-title").textContent = project.title;
    root.innerHTML = renderProject(project);
  }

  document.addEventListener("click", (event) => {
    const urgencyButton = event.target.closest("[data-urgency]");
    if (urgencyButton) {
      currentUrgency = urgencyButton.getAttribute("data-urgency");
      renderPage();
      return;
    }

    const toggleButton = event.target.closest("[data-toggle-todo]");
    if (toggleButton) {
      const projectId = toggleButton.getAttribute("data-toggle-todo");
      const todoId = toggleButton.getAttribute("data-todo-id");
      const isCompleted = toggleButton.getAttribute("data-completed") === "true";
      store.toggleProjectTodo(projectId, todoId, !isCompleted);
      renderPage();
    }
  });

  document.addEventListener("submit", (event) => {
    if (event.target.id !== "project-todo-form") return;
    event.preventDefault();
    const project = getCurrentProject();
    if (!project) return;
    const input = document.getElementById("project-todo-input");
    const text = String(input.value || "").trim();
    if (!text) return;
    store.addProjectTodo(project.id, { text, urgency: currentUrgency });
    currentUrgency = "soon";
    pendingTaskText = "";
    renderPage();
  });

  document.addEventListener("input", (event) => {
    if (event.target.id === "project-todo-input") {
      pendingTaskText = event.target.value;
    }
  });

  window.addEventListener(store.TODO_UPDATE_EVENT, renderPage);
  window.addEventListener("storage", (event) => {
    if (!event.key || event.key === store.STORAGE_KEY) {
      renderPage();
    }
  });

  renderPage();
</script>
</body>
</html>
